<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>City Fixer - SDG 11</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: #05080f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden
    }

    canvas {
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(64, 195, 240, 0.25)
    }

    #hint {
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
      margin-top: 10px;
      letter-spacing: 1px
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <div id="hint">WASD = Gerak &nbsp;|&nbsp; E = Perbaiki Lampu &nbsp;|&nbsp; SPACE = Mulai &nbsp;|&nbsp; ESC = Pause
    &nbsp;|&nbsp; M = Menu</div>
  <script>
    const cv = document.getElementById('c'), cx = cv.getContext('2d');
    const W = 1100, H = 620; cv.width = W; cv.height = H;

    // ── AUDIO (Web Audio API) ──────────────────────────────
    const AC = new (window.AudioContext || window.webkitAudioContext)();
    document.addEventListener('click', () => { if (AC.state === 'suspended') AC.resume(); });
    const beep = (f, d, t = 'sine', v = .3, isMusic = false) => {
      const actualV = v * (isMusic ? (typeof volMusic !== 'undefined' ? volMusic : 0.7) : (typeof volSfx !== 'undefined' ? volSfx : 0.8));
      if (actualV <= 0) return;
      const o = AC.createOscillator(), g = AC.createGain(); o.connect(g); g.connect(AC.destination); o.frequency.value = f; o.type = t;
      g.gain.setValueAtTime(actualV, AC.currentTime); g.gain.exponentialRampToValueAtTime(.001, AC.currentTime + d); o.start(); o.stop(AC.currentTime + d);
    };
    const sfxCollect = () => { beep(880, .08); setTimeout(() => beep(1100, .12), 70); };
    const sfxLamp = () => { beep(660, .08); setTimeout(() => beep(880, .08), 90); setTimeout(() => beep(1320, .2), 190); };
    const sfxHit = () => beep(100, .35, 'sawtooth', .5);
    const sfxWin = () => [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, .4), i * 150));
    const sfxLose = () => [440, 349, 294, 220].forEach((f, i) => setTimeout(() => beep(f, .3), i * 100));
    let bgmInt = null;
    const playBGM = () => {
      if (bgmInt) clearInterval(bgmInt);
      const seq = [
        261.63, 329.63, 392.00, 523.25, // C E G C
        349.23, 440.00, 523.25, 698.46, // F A C F
        392.00, 493.88, 587.33, 783.99, // G B D G
        261.63, 329.63, 392.00, 523.25  // C E G C
      ];
      let i = 0;
      bgmInt = setInterval(() => {
        if (st === S.PLAY) {
          beep(seq[i] / 2, 0.15, 'triangle', 0.1, true); // Bass
          if (i % 2 === 0) beep(seq[i], 0.2, 'sine', 0.05, true); // Arp
          i = (i + 1) % seq.length;
        }
      }, 200);
    };

    // ── STATE ──────────────────────────────────────────────
    const S = { MENU: 0, PLAY: 1, WIN: 2, LOSE: 3, PAUSE: 4 };
    let st = S.MENU, score, lives, timer, flash, flashT, lastT = 0, level = 1;
    let floats = [], shakeX = 0, shakeY = 0, shakeT = 0, shakeM = 8, combo = 0, comboT = 0;
    let highscore = parseInt(localStorage.getItem('cf_hs') || '0');
    let difficulty = 1;
    const DIFF_SPEED = [0.7, 1.0, 1.4]; // mudah, normal, susah
    const doShake = (t, m) => { shakeT = t; shakeM = m; };
    const addFloat = (x, y, t, c) => floats.push({ x, y, vy: -55, life: 1.5, txt: t, col: c });
    const spawnConfetti = () => { for (let i = 0; i < 90; i++)parts.push({ x: rand(0, W), y: rand(-100, 0), vx: rand(-30, 30), vy: rand(80, 200), life: 3 + rand(0, 2), r: 5 + rand(0, 4), col: `hsl(${~~rand(0, 360)},90%,60%)`, conf: true }); };

    // ── INPUT ──────────────────────────────────────────────
    const K = {};
    addEventListener('keydown', e => {
      K[e.code] = true; e.preventDefault();
      if (e.code === 'KeyE') fixLamp();
      if (e.code === 'KeyM') { goToMenu(); }
      if (e.code === 'Escape') {
        if (st === S.PLAY) st = S.PAUSE;
        else if (st === S.PAUSE) { st = S.PLAY; lastT = performance.now(); }
        else if (st === S.WIN || st === S.LOSE) goToMenu();
      }
      if (e.code === 'Space' || e.code === 'Enter') {
        if (st === S.MENU || st === S.WIN || st === S.LOSE) init(st !== S.PAUSE);
        if (st === S.PAUSE) { st = S.PLAY; lastT = performance.now(); }
      }
    });
    addEventListener('keyup', e => K[e.code] = false);

    // ── ENTITIES ───────────────────────────────────────────
    let P, trash, lamps, cars, parts, npcs, pollClouds, raindrops, powerups;
    function goToMenu() { if (bgmInt) clearInterval(bgmInt); bgmInt = null; st = S.MENU; }

    const LEVELS = [
      { name: 'LEVEL 1: SIANG CERAH', time: 40, skyColor: '#4CA1AF', buildingBase: [100, 140, 180], overlay: 'rgba(0,0,0,0)', rain: false, cloudRate: 0.001 },
      { name: 'LEVEL 2: SORE BERPOLUSI', time: 40, skyColor: '#ff7b54', buildingBase: [90, 60, 50], overlay: 'rgba(40,15,0,0.25)', rain: false, cloudRate: 0.003 },
      { name: 'LEVEL 3: MALAM KELAM', time: 45, skyColor: '#07091a', buildingBase: [20, 25, 35], overlay: 'rgba(8,12,25,0.6)', rain: false, cloudRate: 0.005 },
      { name: 'LEVEL 4: HUJAN BADAI', time: 45, skyColor: '#1a2530', buildingBase: [25, 30, 35], overlay: 'rgba(5,10,20,0.7)', rain: true, cloudRate: 0.006 },
      { name: 'LEVEL 5: PUSAT POLUSI', time: 50, skyColor: '#300010', buildingBase: [35, 10, 10], overlay: 'rgba(40,0,10,0.65)', rain: true, cloudRate: 0.008 }
    ];

    let currentLevelIdx = 0;
    let levelData = LEVELS[0];
    let bldg = [];

    function init(fullReset = false) {
      AC.resume();
      if (fullReset) { score = 0; lives = 3; currentLevelIdx = 0; }
      levelData = LEVELS[currentLevelIdx];
      st = S.PLAY; flash = ''; flashT = 0; lastT = performance.now(); level = currentLevelIdx + 1;
      timer = levelData.time;
      playBGM();
      floats = []; combo = 0; comboT = 0; shakeX = 0; shakeY = 0;
      P = { x: W / 2, y: 260, vx: 0, vy: 0, r: 16, inv: 0, blink: true, bt: 0, ang: 0, superT: 0 };
      trash = []; lamps = []; cars = []; parts = []; npcs = []; pollClouds = []; raindrops = []; powerups = [];

      generateMap();

      const ds = DIFF_SPEED[difficulty];
      [
        { h: true, x: 0, y: 130, spd: 130 * ds, col: '#e53935' },
        { h: true, x: W, y: 260, spd: -155 * ds, col: '#1e88e5' },
        { h: true, x: 0, y: 390, spd: 120 * ds, col: '#43a047' },
        { h: true, x: W, y: 520, spd: -140 * ds, col: '#fb8c00' },
      ].forEach(v => cars.push({ ...v, w: 54, ht: 26 }));
      for (let i = 0; i < 4; i++) spawnNPC();
      for (let i = 0; i < 2; i++) spawnPollCloud();
      spawnTrash(6);
      requestAnimationFrame(loop);
    }

    function generateMap() {
      bldg = []; lamps = [];
      const rows = [{ y: 30, h: 75 }, { y: 175, h: 70 }, { y: 305, h: 60 }, { y: 435, h: 60 }, { y: 545, h: 60 }];
      rows.forEach(r => {
        let curX = rand(20, 60);
        while (curX < W - 80) {
          let bw = rand(80, 130);
          if (curX + bw > W - 40) bw = W - 40 - curX;
          bldg.push([curX, r.y, bw, r.h]);
          curX += bw + rand(80, 150);
        }
      });

      const streetsY = [130, 260, 390, 520];
      streetsY.forEach(sy => {
        [200, 550, 900].forEach(lx => {
          if (Math.random() < 0.7) {
            lamps.push({ x: lx + rand(-30, 30), y: sy, fixed: false, pulse: 0, life: 0 });
          }
        });
      });
    }

    function spawnNPC() {
      let x, y, ok;
      do {
        x = rand(60, W - 60); y = rand(60, H - 60);
        ok = dist(x, y, W / 2, H / 2) > 80;
        if (bldg.some(([bx, by, bw, bh]) => x + 11 > bx && x - 11 < bx + bw && y + 11 > by - 25 && y - 11 < by + bh)) ok = false;
      } while (!ok);
      npcs.push({ x, y, r: 11, vx: 0, vy: 0, scared: false, scaredT: 0, tx: x, ty: y, wt: rand(1, 3), col: `hsl(${~~rand(20, 340)},70%,65%)`, dir: 1 });
    }

    function spawnPollCloud() {
      const side = Math.floor(rand(0, 4));
      let x, y;
      if (side === 0) { x = rand(50, W - 50); y = -40; }
      else if (side === 1) { x = rand(50, W - 50); y = H + 40; }
      else if (side === 2) { x = -40; y = rand(50, H - 50); }
      else { x = W + 40; y = rand(50, H - 50); }
      pollClouds.push({ x, y, r: 22, vx: 0, vy: 0, pulse: rand(0, 6.28), hp: 3, hitT: 0 });
    }

    function spawnTrash(n = 1) {
      for (let i = 0; i < n; i++) {
        let x, y, ok;
        do {
          x = rand(70, W - 70); y = rand(80, H - 80);
          ok = dist(x, y, W / 2, H / 2) > 70;
          if (bldg.some(([bx, by, bw, bh]) => x + 13 > bx && x - 13 < bx + bw && y + 13 > by - 25 && y - 13 < by + bh)) ok = false;
        } while (!ok);
        trash.push({ x, y, r: 13, bob: rand(0, 6.28), type: Math.floor(rand(0, 3)) });
      }
    }

    function spawnPowerup() {
      if (powerups.length > 0) return;
      let x, y, ok;
      do {
        x = rand(100, W - 100); y = rand(100, H - 100); ok = true;
        if (bldg.some(([bx, by, bw, bh]) => x + 16 > bx && x - 16 < bx + bw && y + 16 > by - 25 && y - 16 < by + bh)) ok = false;
      } while (!ok);
      powerups.push({ x, y, r: 16, bob: rand(0, 6.28) });
    }

    // ── LOOP ───────────────────────────────────────────────
    function loop(ts) {
      const dt = Math.min((ts - lastT) / 1000, 0.05); lastT = ts;
      if (st === S.PLAY) {
        update(dt);
        if (timer <= 0) endGame(true);
      }
      draw();
      requestAnimationFrame(loop);
    }

    // ── UPDATE ─────────────────────────────────────────────
    function update(dt) {
      timer -= dt;

      if (P.superT > 0) {
        P.superT -= dt;
        if (P.superT <= 0) P.superT = 0;
      }

      lamps.forEach(l => {
        if (l.fixed) {
          l.life -= dt * (2.5 + level * 0.5);
          if (l.life <= 0) {
            l.fixed = false;
            sfxLose();
          }
        }
      });

      if (flashT > 0) flashT -= dt;

      let dx = 0, dy = 0;
      if (K.KeyW || K.ArrowUp) dy = -1;
      if (K.KeyS || K.ArrowDown) dy = 1;
      if (K.KeyA || K.ArrowLeft) { dx = -1; }
      if (K.KeyD || K.ArrowRight) { dx = 1; }
      if (touch.active) { dx += touch.dx; dy += touch.dy; }
      const mag = Math.hypot(dx, dy); if (mag > 1) { dx /= mag; dy /= mag; }
      P.vx = dx * 210; P.vy = dy * 210;
      let nextX = P.x + P.vx * dt;
      let nextY = P.y + P.vy * dt;

      const collide = bldg.some(([bx, by, bw, bh]) =>
        nextX + P.r > bx && nextX - P.r < bx + bw &&
        nextY + P.r > by - 25 && nextY - P.r < by + bh
      );

      if (!collide) {
        P.x = clamp(nextX, P.r + 8, W - P.r - 8);
        P.y = clamp(nextY, P.r + 8, H - P.r - 8);
      } else {
        const collX = bldg.some(([bx, by, bw, bh]) =>
          nextX + P.r > bx && nextX - P.r < bx + bw &&
          P.y + P.r > by - 25 && P.y - P.r < by + bh
        );
        if (!collX) P.x = clamp(nextX, P.r + 8, W - P.r - 8);

        const collY = bldg.some(([bx, by, bw, bh]) =>
          P.x + P.r > bx && P.x - P.r < bx + bw &&
          nextY + P.r > by - 25 && nextY - P.r < by + bh
        );
        if (!collY) P.y = clamp(nextY, P.r + 8, H - P.r - 8);
      }

      if (dx !== 0 || dy !== 0) { P.tAng = Math.atan2(dy, dx); }
      P.ang = P.ang || 0;
      let pdiff = (P.tAng || 0) - P.ang;
      while (pdiff < -Math.PI) pdiff += Math.PI * 2;
      while (pdiff > Math.PI) pdiff -= Math.PI * 2;
      P.ang += pdiff * 15 * dt;

      if (P.inv > 0) {
        P.inv -= dt; P.bt += dt;
        if (P.bt > .1) { P.blink = !P.blink; P.bt = 0; }
        if (P.inv <= 0) P.blink = true;
      }

      cars.forEach(c => {
        if (c.h) c.x += c.spd * dt; else c.y += c.spd * dt;
        if (c.x > W + 60) c.x = -60; if (c.x < -60) c.x = W + 60;
        if (c.y > H + 60) c.y = -60; if (c.y < -60) c.y = H + 60;
        if (Math.random() < .25) {
          let ex = c.h ? c.x - Math.sign(c.spd) * c.w / 2 : c.x + rand(-8, 8);
          let ey = c.h ? c.y + rand(-6, 6) : c.y - Math.sign(c.spd) * c.ht / 2;
          parts.push({ x: ex, y: ey, vx: rand(-20, 20), vy: rand(-30, -10), life: .7, r: 4, col: 'rgba(180,180,180,0.6)' });
        }
        if (P.inv <= 0 && rectCircle(c.x - c.w / 2, c.y - c.ht / 2, c.w, c.ht, P.x, P.y, P.r)) {
          lives--; sfxHit(); doShake(.4, 10); combo = 0;
          setFlash('Kena Polusi!', 'red');
          P.inv = 2; P.blink = true;
          burst(P.x, P.y, '#f44336', 18);
          if (lives <= 0) endGame(false);
        }
      });

      trash = trash.filter(t => {
        if (dist(P.x, P.y, t.x, t.y) < P.r + t.r) {
          combo++; comboT = 2.5;
          const pts = 10 + (combo >= 3 ? 15 : 0);
          addScore(pts);
          addFloat(t.x, t.y, '+' + (pts), combo >= 3 ? '#ffd740' : '#69d672');
          sfxCollect(); burst(t.x, t.y, '#69d672', 8); return false;
        } return true;
      });
      if (trash.length < 5 && Math.random() < .01) spawnTrash(1);

      if (Math.random() < 0.001) spawnPowerup();
      powerups = powerups.filter(pu => {
        if (dist(P.x, P.y, pu.x, pu.y) < P.r + pu.r) {
          P.superT = 10;
          setFlash('SUPER MODE!', '#00ffcc');
          sfxWin();
          return false;
        }
        return true;
      });

      parts.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; if (!p.conf) p.vy += 60 * dt; p.life -= dt; });
      parts = parts.filter(p => p.life > 0);

      const fixedLamps = lamps.filter(l => l.fixed);
      const superMode = (P.superT > 0);

      npcs.forEach(n => {
        let scared = false;
        let targetCloud = null, cd = Infinity;
        pollClouds.forEach(pc => {
          const d = dist(n.x, n.y, pc.x, pc.y);
          if (d < 140) { scared = true; }
          if (d < cd) { cd = d; targetCloud = pc; }
        });
        n.scared = scared && !superMode;
        if (n.scared) { n.scaredT = 1.5; }
        else if (n.scaredT > 0) { n.scaredT -= dt; }

        if (superMode && targetCloud) {
          n.tx = targetCloud.x + rand(-10, 10);
          n.ty = targetCloud.y + rand(-10, 10);
        } else if (n.scared && fixedLamps.length > 0) {
          let best = fixedLamps[0], bd = dist(n.x, n.y, best.x, best.y);
          fixedLamps.forEach(l => { const d = dist(n.x, n.y, l.x, l.y); if (d < bd) { bd = d; best = l; } });
          n.tx = best.x + rand(-20, 20); n.ty = best.y + rand(-20, 20);
        } else if (!n.scared) {
          n.wt -= dt;
          if (n.wt <= 0) { n.tx = rand(60, W - 60); n.ty = rand(60, H - 60); n.wt = rand(2, 5); }
        }
        const ddx = n.tx - n.x, ddy = n.ty - n.y, dm = Math.hypot(ddx, ddy);
        const spd = n.scared ? 110 : 55;
        if (dm > 5) {
          n.vx = ddx / dm * spd; n.vy = ddy / dm * spd;
          n.tAng = Math.atan2(n.vy, n.vx);
        } else { n.vx = 0; n.vy = 0; }

        let nNextX = n.x + n.vx * dt;
        let nNextY = n.y + n.vy * dt;
        const nCollide = bldg.some(([bx, by, bw, bh]) =>
          nNextX + n.r > bx && nNextX - n.r < bx + bw &&
          nNextY + n.r > by - 25 && nNextY - n.r < by + bh
        );
        if (!nCollide) {
          n.x = clamp(nNextX, n.r + 4, W - n.r - 4);
          n.y = clamp(nNextY, n.r + 4, H - n.r - 4);
        } else {
          const collX = bldg.some(([bx, by, bw, bh]) =>
            nNextX + n.r > bx && nNextX - n.r < bx + bw &&
            n.y + n.r > by - 25 && n.y - n.r < by + bh
          );
          if (!collX) { n.x = clamp(nNextX, n.r + 4, W - n.r - 4); n.ty = n.y; }

          const collY = bldg.some(([bx, by, bw, bh]) =>
            n.x + n.r > bx && n.x - n.r < bx + bw &&
            nNextY + n.r > by - 25 && nNextY - n.r < by + bh
          );
          if (!collY) { n.y = clamp(nNextY, n.r + 4, H - n.r - 4); n.tx = n.x; }

          if (collX && collY) {
            n.tx = rand(60, W - 60); n.ty = rand(60, H - 60);
          }
        }

        n.ang = n.ang || 0;
        let ndiff = (n.tAng || 0) - n.ang;
        while (ndiff < -Math.PI) ndiff += Math.PI * 2;
        while (ndiff > Math.PI) ndiff -= Math.PI * 2;
        n.ang += ndiff * 10 * dt;
      });

      pollClouds.forEach(pc => {
        pc.hitT = Math.max(0, pc.hitT - dt);
        pc.pulse += dt * 2;
        let target = null, td = Infinity;
        npcs.forEach(n => {
          const safe = fixedLamps.some(l => dist(n.x, n.y, l.x, l.y) < 88);
          if (!safe) { const d = dist(pc.x, pc.y, n.x, n.y); if (d < td) { td = d; target = n; } }
        });
        let repX = 0, repY = 0;
        fixedLamps.forEach(l => {
          const d = dist(pc.x, pc.y, l.x, l.y);
          if (d < 110) {
            repX += (pc.x - l.x) / d * (110 - d);
            repY += (pc.y - l.y) / d * (110 - d);
          }
        });
        const cspd = 55 + level * 10;
        if (target) {
          let ax = (target.x - pc.x), ay = (target.y - pc.y), am = Math.hypot(ax, ay) || 1;
          pc.vx = (ax / am * cspd) + repX * 0.9;
          pc.vy = (ay / am * cspd) + repY * 0.9;
        } else {
          let ax = (P.x - pc.x), ay = (P.y - pc.y), am = Math.hypot(ax, ay) || 1;
          pc.vx = (ax / am * cspd * 0.7) + repX * 0.9;
          pc.vy = (ay / am * cspd * 0.7) + repY * 0.9;
        }
        const vm = Math.hypot(pc.vx, pc.vy) || 1;
        const maxSpd = cspd * 1.5;
        if (vm > maxSpd) { pc.vx = pc.vx / vm * maxSpd; pc.vy = pc.vy / vm * maxSpd; }

        pc.x += pc.vx * dt;
        pc.y += pc.vy * dt;

        if (pc.x < -60) pc.x = W + 60; if (pc.x > W + 60) pc.x = -60;
        if (pc.y < -60) pc.y = H + 60; if (pc.y > H + 60) pc.y = -60;
        npcs.forEach(n => {
          const safe = fixedLamps.some(l => dist(n.x, n.y, l.x, l.y) < 88);
          if (dist(pc.x, pc.y, n.x, n.y) < pc.r + n.r) {
            if (superMode) {
              pc.hp -= 100; burst(pc.x, pc.y, '#c060ff', 25);
              addScore(50);
              sfxLamp();
            } else if (!safe) {
              n._dead = true;
              score = Math.max(0, score - 20);
              setFlash('Warga Terpapar!', 'orange');
              burst(n.x, n.y, '#ff9800', 10);
              doShake(0.3, 7);
              setTimeout(spawnNPC, 3000);
            }
          }
        });
        if (dist(P.x, P.y, pc.x, pc.y) < P.r + pc.r - 4) {
          if (superMode) {
            pc.hp -= 100; burst(pc.x, pc.y, '#c060ff', 25);
            addScore(50);
            sfxLamp();
          } else if (P.inv <= 0) {
            lives--; sfxHit(); doShake(.4, 10); combo = 0;
            setFlash('Terpapar!', 'red');
            P.inv = 2; P.blink = true;
            burst(P.x, P.y, '#f44336', 18);
            if (lives <= 0) endGame(false);
          }
        }
        if (pc.hp <= 0) pc._dead = true;
      });
      pollClouds = pollClouds.filter(pc => !pc._dead);
      npcs = npcs.filter(n => !n._dead);
      if (pollClouds.length < 2 + level && Math.random() < levelData.cloudRate) spawnPollCloud();

      if (shakeT > 0) { shakeT -= dt; shakeX = (Math.random() - .5) * shakeM * 2; shakeY = (Math.random() - .5) * shakeM * 2; } else { shakeX = 0; shakeY = 0; }
      if (comboT > 0) { comboT -= dt; } else { combo = 0; }
      floats.forEach(f => { f.y += f.vy * dt; f.life -= dt; }); floats = floats.filter(f => f.life > 0);

      if (levelData.rain) {
        if (!raindrops) raindrops = [];
        for (let i = 0; i < 6; i++) {
          raindrops.push({ x: rand(-200, W + 200), y: rand(-50, 0), l: rand(10, 25), s: rand(600, 900) });
        }
        raindrops.forEach(r => { r.y += r.s * dt; r.x += r.s * 0.15 * dt; });
        raindrops = raindrops.filter(r => r.y < H + 50);
      }
    }

    function fixLamp() {
      if (st !== S.PLAY) return;
      lamps.forEach(l => {
        if (!l.fixed && dist(P.x, P.y, l.x, l.y) < 75) {
          l.fixed = true; l.life = 100; sfxLamp();
          addScore(30);
          addFloat(l.x, l.y, '+30', '#ffd740');
          burst(l.x, l.y, '#ffd740', 12);
        } else if (l.fixed && dist(P.x, P.y, l.x, l.y) < 75 && l.life < 50) {
          l.life = 100; sfxCollect();
          addScore(10);
          addFloat(l.x, l.y, '+10', '#ffd740');
        }
      });
    }

    function addScore(v) {
      score = Math.max(0, score + v);
      if (score > highscore) { highscore = score; localStorage.setItem('cf_hs', highscore); }
    }

    let panelWin = false;
    function endGame(win) {
      panelWin = win;
      st = win ? S.WIN : S.LOSE;
      if (win) {
        sfxWin(); setTimeout(spawnConfetti, 200);
      } else { sfxLose(); }
    }

    function setFlash(msg, col) { flash = msg; flashCol = col; flashT = 2; }
    let flashCol = '#fff';

    // ── DRAW ───────────────────────────────────────────────
    function draw() {
      cx.clearRect(0, 0, W, H);
      if (st === S.MENU) { drawMenu(); return; }
      cx.save(); cx.translate(shakeX, shakeY);
      drawBg(); drawLamps(); drawNPCs(); drawPollClouds(); drawPowerups(); drawTrash(); drawCars(); drawParts(); drawPlayer();
      drawLighting();

      if (levelData.rain && raindrops) {
        cx.strokeStyle = 'rgba(180, 210, 255, 0.35)';
        cx.lineWidth = 1.5;
        cx.beginPath();
        raindrops.forEach(r => {
          cx.moveTo(r.x, r.y);
          cx.lineTo(r.x + r.l * 0.15, r.y + r.l);
        });
        cx.stroke();
      }

      cx.restore();
      drawHUD(); drawFloats();
      if (flashT > 0) drawFlash();
      if (st === S.WIN || st === S.LOSE) drawPanel(st === S.WIN);
      if (st === S.PAUSE) drawPause();
    }

    function drawPause() {
      cx.fillStyle = 'rgba(7,9,26,0.78)'; cx.fillRect(0, 0, W, H);
      cx.fillStyle = '#fff'; cx.font = 'bold 44px Segoe UI'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
      cx.fillText('PAUSE', W / 2, H / 2 - 40);
      cx.font = '18px Segoe UI'; cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.fillText('ESC / SPACE = Lanjut', W / 2, H / 2 + 5);
    }

    function drawCharacter(x, y, vx, vy, bobT, colBody, colSkin, isPlayer, scared, angle, superMode) {
      cx.save(); cx.translate(x, y);
      const isMoving = Math.abs(vx) > 5 || Math.abs(vy) > 5;

      cx.fillStyle = 'rgba(0,0,0,0.35)';
      cx.beginPath(); cx.ellipse(0, 14, 12, 5, 0, 0, Math.PI * 2); cx.fill();

      const bobY = isMoving ? Math.sin(bobT) * 1.5 : Math.sin(bobT * 0.5) * 0.5;
      cx.translate(0, bobY);
      cx.rotate(angle);

      if (superMode) {
        cx.shadowBlur = 20; cx.shadowColor = '#00ffcc';
      } else if (isPlayer) {
        cx.shadowBlur = 15; cx.shadowColor = 'rgba(64,200,240,0.5)';
      } else if (scared) {
        cx.shadowBlur = 15; cx.shadowColor = '#ff9800';
      } else {
        cx.shadowBlur = 5; cx.shadowColor = colBody;
      }

      // Body
      cx.fillStyle = colBody;
      rrect(-6, -10, 15, 20, 6);
      cx.shadowBlur = 0;

      // Arms
      const swing = isMoving ? Math.sin(bobT) * 5 : 0;
      cx.fillStyle = colBody;
      cx.beginPath(); cx.arc(2 - swing, -11, 4, 0, Math.PI * 2); cx.fill();
      cx.beginPath(); cx.arc(2 + swing, 11, 4, 0, Math.PI * 2); cx.fill();

      // Hands
      cx.fillStyle = colSkin;
      cx.beginPath(); cx.arc(8 - swing, -11, 3.5, 0, Math.PI * 2); cx.fill();
      cx.beginPath(); cx.arc(8 + swing, 11, 3.5, 0, Math.PI * 2); cx.fill();

      // Head
      cx.fillStyle = colSkin;
      cx.beginPath(); cx.arc(0, 0, 9, 0, Math.PI * 2); cx.fill();

      // Hair/Helmet
      if (isPlayer) {
        cx.fillStyle = '#ffb300';
        cx.beginPath(); cx.arc(0, 0, 9.5, -Math.PI / 2, Math.PI / 2); cx.fill();
        cx.fillRect(-3, -11, 3, 22);
      } else {
        cx.fillStyle = '#4e342e';
        cx.beginPath(); cx.arc(0, 0, 8.5, -Math.PI / 2, Math.PI / 2); cx.fill();
      }

      // Eyes
      cx.fillStyle = '#fff';
      cx.beginPath(); cx.arc(5, -4, 2.5, 0, Math.PI * 2); cx.fill();
      cx.beginPath(); cx.arc(5, 4, 2.5, 0, Math.PI * 2); cx.fill();
      cx.fillStyle = '#000';
      cx.beginPath(); cx.arc(6, -4, 1.2, 0, Math.PI * 2); cx.fill();
      cx.beginPath(); cx.arc(6, 4, 1.2, 0, Math.PI * 2); cx.fill();

      if (scared) {
        cx.fillStyle = '#ff9800'; cx.font = 'bold 16px Segoe UI'; cx.textAlign = 'center';
        cx.save(); cx.rotate(-angle); cx.fillText('!', 0, -22); cx.restore();
        cx.fillStyle = '#000'; cx.beginPath(); cx.arc(6, 0, 2, 0, Math.PI * 2); cx.fill();
      } else {
        cx.strokeStyle = '#000'; cx.lineWidth = 1;
        cx.beginPath(); cx.arc(6, 0, 3, -Math.PI / 2 + 0.2, Math.PI / 2 - 0.2); cx.stroke();
      }

      cx.restore();
    }

    function drawNPCs() {
      npcs.forEach(n => {
        n.bobT = (n.bobT || rand(0, 10)) + 0.1;
        drawCharacter(n.x, n.y, n.vx, n.vy, n.bobT, n.col, '#ffccaa', false, n.scared, n.ang, P.superT > 0);
      });
    }

    function drawPollClouds() {
      pollClouds.forEach(pc => {
        const p = pc.pulse;
        cx.save(); cx.translate(pc.x, pc.y);
        const cg = cx.createRadialGradient(0, 0, 1, 0, 0, pc.r);
        cg.addColorStop(0, 'rgba(190,80,255,0.95)'); cg.addColorStop(1, 'rgba(80,0,160,0.8)');
        cx.fillStyle = cg; cx.beginPath(); cx.arc(0, 0, pc.r, 0, 6.28); cx.fill();

        const dir = pc.vx > 0 ? 1 : -1;
        cx.fillStyle = '#ffea00';
        cx.beginPath(); cx.moveTo(-10 + dir * 3, -6); cx.lineTo(-2 + dir * 3, -2); cx.lineTo(-12 + dir * 3, -1); cx.fill();
        cx.beginPath(); cx.moveTo(10 + dir * 3, -6); cx.lineTo(2 + dir * 3, -2); cx.lineTo(12 + dir * 3, -1); cx.fill();

        cx.strokeStyle = '#ffea00'; cx.lineWidth = 2; cx.lineJoin = 'round';
        cx.beginPath();
        cx.moveTo(-8 + dir * 2, 8); cx.lineTo(-4 + dir * 2, 4); cx.lineTo(0 + dir * 2, 9); cx.lineTo(4 + dir * 2, 4); cx.lineTo(8 + dir * 2, 8);
        cx.stroke();

        cx.restore();
      });
    }

    function drawBg() {
      cx.fillStyle = levelData.skyColor; cx.fillRect(0, 0, W, H);
      [130, 260, 390, 520].forEach(y => {
        cx.fillStyle = 'rgba(0,0,0,0.3)'; cx.fillRect(0, y - 22, W, 44);
        cx.strokeStyle = 'rgba(255,255,255,0.06)'; cx.lineWidth = 1;
        cx.setLineDash([28, 18]);
        cx.beginPath(); cx.moveTo(0, y); cx.lineTo(W, y); cx.stroke();
        cx.setLineDash([]);
      });

      bldg.forEach((b, i) => {
        const [x, y, w, h] = b;
        const leanX = 0;
        const leanY = -25;
        const bR = levelData.buildingBase[0] + i % 3 * 10, bG = levelData.buildingBase[1] + i % 4 * 10, bB = levelData.buildingBase[2] + i % 2 * 10;

        cx.fillStyle = `rgb(${bR + 8},${bG + 8},${bB + 8})`;
        cx.beginPath(); cx.moveTo(x + w, y); cx.lineTo(x + w + leanX, y + leanY); cx.lineTo(x + w + leanX, y + h + leanY); cx.lineTo(x + w, y + h); cx.fill();
        cx.beginPath(); cx.moveTo(x, y); cx.lineTo(x + leanX, y + leanY); cx.lineTo(x + leanX, y + h + leanY); cx.lineTo(x, y + h); cx.fill();
        cx.fillStyle = `rgb(${bR + 4},${bG + 4},${bB + 4})`;
        cx.beginPath(); cx.moveTo(x, y + h); cx.lineTo(x + leanX, y + h + leanY); cx.lineTo(x + w + leanX, y + h + leanY); cx.lineTo(x + w, y + h); cx.fill();
        cx.beginPath(); cx.moveTo(x, y); cx.lineTo(x + leanX, y + leanY); cx.lineTo(x + w + leanX, y + leanY); cx.lineTo(x + w, y); cx.fill();

        cx.fillStyle = `rgb(${bR + 16},${bG + 16},${bB + 16})`;
        cx.fillRect(x + leanX, y + leanY, w, h);
        cx.strokeStyle = `rgba(255,255,255,0.05)`; cx.lineWidth = 1;
        cx.strokeRect(x + leanX, y + leanY, w, h);

        cx.fillStyle = `rgb(${bR},${bG},${bB})`;
        cx.fillRect(x + leanX + 15, y + leanY + 15, 12, 12);

        if (levelData.overlay.indexOf('0.6') !== -1 || levelData.overlay.indexOf('0.7') !== -1 || levelData.overlay.indexOf('0.65') !== -1) {
          if (i % 2 === 0) {
            cx.fillStyle = 'rgba(255, 230, 90, 0.4)';
            cx.beginPath();
            for (let wy = 5; wy < h - 20; wy += 18) {
              for (let wx = 5; wx < w - 20; wx += 20) {
                if (Math.sin(i * 7.3 + wx * .07 + wy * .05) > 0.4) {
                  cx.fillRect(x + w / 2 + wx - w / 2 + leanX * 0.5, y + h + wy - h / 2 + leanY * 0.5, 6, 8);
                }
              }
            }
          }
        }
      });
    }

    function drawLamps() {
      lamps.forEach(l => {
        if (l.fixed) {
          const g = cx.createRadialGradient(l.x, l.y, 0, l.x, l.y, 85);
          g.addColorStop(0, 'rgba(255,215,64,0.22)'); g.addColorStop(1, 'rgba(255,215,64,0)');
          cx.fillStyle = g; cx.beginPath(); cx.arc(l.x, l.y, 85, 0, 6.28); cx.fill();
        }
        cx.strokeStyle = l.fixed ? '#90a4ae' : '#546e7a'; cx.lineWidth = 3;
        cx.beginPath(); cx.moveTo(l.x, l.y + 35); cx.lineTo(l.x, l.y); cx.stroke();
        cx.shadowBlur = l.fixed ? 18 : 0; cx.shadowColor = '#ffd740';
        cx.fillStyle = l.fixed ? '#ffd740' : '#546e7a';
        cx.beginPath(); cx.arc(l.x, l.y, 14, 0, 6.28); cx.fill();
        cx.shadowBlur = 0;
      });
    }

    function drawPowerups() {
      powerups.forEach(pu => {
        const bob = Math.sin(Date.now() * .003 + pu.bob) * 5;
        cx.save(); cx.translate(pu.x, pu.y + bob);
        cx.shadowBlur = 20; cx.shadowColor = '#00ffcc';
        cx.fillStyle = '#00ffcc';
        cx.beginPath(); cx.arc(0, 0, pu.r, 0, Math.PI * 2); cx.fill();
        cx.shadowBlur = 0;
        cx.fillStyle = '#fff';
        cx.font = '16px Segoe UI'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillText('T', 0, 0);
        cx.restore();
      });
    }

    function drawTrash() {
      trash.forEach(t => {
        const bob = Math.sin(Date.now() * .001 * 1.8 + t.bob) * 5;
        cx.shadowBlur = 12; cx.shadowColor = 'rgba(105,214,114,0.5)';
        cx.fillStyle = 'rgba(105,214,114,0.15)';
        cx.beginPath(); cx.arc(t.x, t.y + bob, t.r + 5, 0, 6.28); cx.fill();
        cx.shadowBlur = 0;
        cx.save(); cx.translate(t.x, t.y + bob);
        if (t.type === 0) {
          cx.fillStyle = '#e0e0e0';
          cx.beginPath(); cx.moveTo(-5, -5); cx.lineTo(3, -7); cx.lineTo(6, 2); cx.lineTo(0, 6); cx.lineTo(-6, 3); cx.fill();
        } else if (t.type === 1) {
          cx.fillStyle = '#4caf50';
          rrect(-3, -6, 6, 12, 2);
        } else {
          cx.fillStyle = '#f44336';
          rrect(-4, -5, 8, 10, 1);
        }
        cx.restore();
      });
    }

    function drawCars() {
      cars.forEach(c => {
        cx.save(); cx.translate(c.x, c.y);
        const col = c.col || '#e53935';
        cx.shadowBlur = 14; cx.shadowColor = col;
        if (c.h) {
          if (c.spd < 0) cx.scale(-1, 1);
          const w = c.w, h = c.ht;
          cx.fillStyle = col; rrect(-w / 2, -h / 2, w, h, 5);
          cx.fillStyle = 'rgba(0,0,0,0.3)'; cx.fillRect(-w / 2 + 5, -h / 2 + 4, w - 10, h * .4);
          cx.shadowColor = '#fffde7'; cx.shadowBlur = 8; cx.fillStyle = '#fffde7';
          cx.fillRect(w / 2 - 7, -h / 2 + 3, 5, 5); cx.fillRect(w / 2 - 7, h / 2 - 8, 5, 5);
        } else {
          if (c.spd < 0) cx.scale(1, -1);
          const w = c.w, h = c.ht;
          cx.fillStyle = col; rrect(-w / 2, -h / 2, w, h, 5);
          cx.fillStyle = 'rgba(0,0,0,0.3)'; cx.fillRect(-w / 2 + 3, -h / 2 + 5, w - 6, h * .35);
          cx.shadowColor = '#fffde7'; cx.shadowBlur = 8; cx.fillStyle = '#fffde7';
          cx.fillRect(-w / 2 + 3, h / 2 - 7, 5, 5); cx.fillRect(w / 2 - 8, h / 2 - 7, 5, 5);
        }
        cx.shadowBlur = 0; cx.restore();
      });
    }

    function drawParts() {
      parts.forEach(p => {
        cx.globalAlpha = p.life; cx.fillStyle = p.col;
        cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, 6.28); cx.fill();
      });
      cx.globalAlpha = 1;
    }

    function drawPlayer() {
      if (!P.blink) return;
      const isMoving = Math.abs(P.vx) > 5 || Math.abs(P.vy) > 5;
      P.bobT = (P.bobT || 0) + (isMoving ? 0.015 * Math.hypot(P.vx, P.vy) : 0.05);
      drawCharacter(P.x, P.y, P.vx, P.vy, P.bobT, '#00838f', '#ffccaa', true, false, P.ang, P.superT > 0);
    }

    let lightCanvas, lcx;
    function drawLighting() {
      if (!lightCanvas) {
        lightCanvas = document.createElement('canvas');
        lightCanvas.width = W; lightCanvas.height = H;
        lcx = lightCanvas.getContext('2d');
      }
      lcx.globalCompositeOperation = 'source-over';
      lcx.clearRect(0, 0, W, H);
      lcx.fillStyle = levelData.overlay;
      lcx.fillRect(0, 0, W, H);
      lcx.globalCompositeOperation = 'destination-out';
      lamps.forEach(l => {
        if (l.fixed) {
          let radius = 170;
          const g = lcx.createRadialGradient(l.x, l.y, 0, l.x, l.y, radius);
          g.addColorStop(0, 'rgba(255,255,255,1)');
          g.addColorStop(1, 'rgba(255,255,255,0)');
          lcx.fillStyle = g;
          lcx.beginPath(); lcx.arc(l.x, l.y, radius, 0, Math.PI * 2); lcx.fill();
        }
      });
      cx.drawImage(lightCanvas, 0, 0);
    }

    function drawHUD() {
      cx.fillStyle = 'rgba(10,20,40,0.85)';
      rrect(10, 10, W - 20, 54, 10);
      cx.strokeStyle = 'rgba(64,200,240,0.3)'; cx.lineWidth = 1;
      rrect(10, 10, W - 20, 54, 10, null, null, true);
      cx.fillStyle = '#40c8f0'; cx.font = 'bold 20px Segoe UI'; cx.textAlign = 'left'; cx.textBaseline = 'middle';
      cx.fillText('SKOR', 30, 26);
      cx.fillStyle = '#fff'; cx.font = 'bold 28px Segoe UI';
      cx.fillText(score, 30, 48);
      cx.textAlign = 'center';
      cx.fillStyle = '#ffd740'; cx.font = 'bold 16px Segoe UI';
      cx.fillText(levelData.name, W / 2, 24);
      cx.fillStyle = '#fff'; cx.font = 'bold 26px Segoe UI';
      cx.fillText(Math.ceil(timer) + 's', W / 2, 48);
      cx.fillStyle = '#f44336';
      for (let i = 0; i < 3; i++) {
        if (i < lives) cx.fillRect(W - 40 - i * 30, 26, 20, 20);
        else { cx.strokeStyle = '#f44336'; cx.strokeRect(W - 40 - i * 30, 26, 20, 20); }
      }
    }

    function drawFlash() {
      const a = Math.min(flashT, 1);
      cx.save(); cx.globalAlpha = a;
      cx.fillStyle = 'rgba(7,9,26,0.7)'; rrect(W / 2 - 160, H / 2 - 28, 320, 56, 12);
      cx.fillStyle = flashCol; cx.font = 'bold 22px Segoe UI'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
      cx.fillText(flash, W / 2, H / 2);
      cx.restore();
    }

    function drawMenu() {
      cx.fillStyle = '#05081a'; cx.fillRect(0, 0, W, H);
      // Title
      cx.shadowBlur = 30; cx.shadowColor = 'rgba(64,200,240,0.6)';
      cx.fillStyle = '#40c8f0'; cx.font = 'bold 50px Segoe UI'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
      cx.fillText('City Fixer', W / 2, H / 2 - 80);
      cx.shadowBlur = 0;
      // Subtitle
      cx.fillStyle = '#fff'; cx.font = '18px Segoe UI';
      cx.fillText('Selesaikan 5 Level untuk membersihkan kota!', W / 2, H / 2 - 20);

      // Play Button
      window._menuBtn = { play: { x: W / 2 - 100, y: H / 2 + 40, w: 200, h: 50 } };
      cx.fillStyle = 'rgba(64,200,240,0.2)'; cx.strokeStyle = '#40c8f0'; cx.lineWidth = 2;
      rrect(window._menuBtn.play.x, window._menuBtn.play.y, window._menuBtn.play.w, window._menuBtn.play.h, 25, null, null, true);
      cx.fillStyle = '#40c8f0'; cx.font = 'bold 20px Segoe UI'; cx.textBaseline = 'middle';
      cx.fillText('MAIN SEKARANG', W / 2, H / 2 + 65);
    }

    function drawPanel(win) {
      cx.fillStyle = 'rgba(7,9,26,0.88)'; cx.fillRect(0, 0, W, H);
      const px = (W - 480) / 2, py = (H - 320) / 2;
      cx.fillStyle = win ? '#102810' : '#280a0a';
      rrect(px, py, 480, 320, 16, true);
      cx.textAlign = 'center'; cx.fillStyle = '#fff'; cx.font = 'bold 38px Segoe UI';
      cx.fillText(win ? 'LEVEL SELESAI!' : 'GAGAL', W / 2, py + 80);
      cx.font = '22px Segoe UI';
      cx.fillText('Skor: ' + score, W / 2, py + 130);
      window._panelRestartBtn = { x: px + 100, y: py + 200, w: 280, h: 50 };
      cx.fillStyle = '#40c8f0'; rrect(px + 100, py + 200, 280, 50, 25, true);
      cx.fillStyle = '#000'; cx.font = 'bold 20px Segoe UI'; cx.textBaseline = 'middle';
      const txt = win ? (currentLevelIdx < LEVELS.length - 1 ? 'LANJUT LEVEL ' + (currentLevelIdx + 2) : 'TAMAT - MAIN LAGI') : 'ULANGI LEVEL';
      cx.fillText(txt, W / 2, py + 225);
    }

    function drawFloats() {
      floats.forEach(f => {
        cx.save(); cx.globalAlpha = Math.min(f.life, 1);
        cx.fillStyle = f.col; cx.font = 'bold 20px Segoe UI';
        cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillText(f.txt, f.x, f.y);
        cx.restore();
      });
    }

    function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
    function rand(a, b) { return a + Math.random() * (b - a); }
    function rectCircle(rx, ry, rw, rh, cx2, cy2, cr) {
      const nx = clamp(cx2, rx, rx + rw), ny = clamp(cy2, ry, ry + rh);
      return dist(cx2, cy2, nx, ny) < cr;
    }
    function burst(x, y, col, n) {
      for (let i = 0; i < n; i++) {
        const a = Math.random() * 6.28, sp = rand(60, 180);
        parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: .8, r: 3 + rand(0, 3), col: col });
      }
    }
    function rrect(x, y, w, h, r, fill = true, stroke = false, doStroke = false) {
      cx.beginPath();
      cx.moveTo(x + r, y); cx.lineTo(x + w - r, y); cx.arcTo(x + w, y, x + w, y + r, r);
      cx.lineTo(x + w, y + h - r); cx.arcTo(x + w, y + h, x + w - r, y + h, r);
      cx.lineTo(x + r, y + h); cx.arcTo(x, y + h, x, y + h - r, r);
      cx.lineTo(x, y + r); cx.arcTo(x, y, x + r, y, r); cx.closePath();
      if (fill) cx.fill(); if (doStroke) cx.stroke();
    }

    cv.addEventListener('click', e => {
      const rect = cv.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (W / rect.width), my = (e.clientY - rect.top) * (H / rect.height);
      if (st === S.WIN || st === S.LOSE) {
        if (mx >= window._panelRestartBtn.x && mx <= window._panelRestartBtn.x + window._panelRestartBtn.w && my >= window._panelRestartBtn.y && my <= window._panelRestartBtn.y + window._panelRestartBtn.h) {
          if (panelWin) {
            if (currentLevelIdx < LEVELS.length - 1) { currentLevelIdx++; init(false); }
            else { init(true); }
          } else { init(true); }
        }
      } else if (st === S.MENU) {
        if (window._menuBtn && window._menuBtn.play) {
          if (mx >= window._menuBtn.play.x && mx <= window._menuBtn.play.x + window._menuBtn.play.w && my >= window._menuBtn.play.y && my <= window._menuBtn.play.y + window._menuBtn.play.h) {
            init(true);
          }
        } else {
          init(true); // Fallback
        }
      }
    });

    let touch = { active: false, sx: 0, sy: 0, dx: 0, dy: 0 };
    cv.addEventListener('touchstart', e => {
      e.preventDefault();
      const rect = cv.getBoundingClientRect();
      const scaleX = W / rect.width, scaleY = H / rect.height;
      const t = e.touches[0];
      touch.active = true;
      touch.sx = (t.clientX - rect.left) * scaleX;
      touch.sy = (t.clientY - rect.top) * scaleY;
      touch.dx = 0; touch.dy = 0;
      if (st === S.MENU || st === S.WIN || st === S.LOSE) { AC.resume(); init(); }
    }, { passive: false });
    cv.addEventListener('touchmove', e => {
      e.preventDefault();
      const rect = cv.getBoundingClientRect();
      const scaleX = W / rect.width, scaleY = H / rect.height;
      const t = e.touches[0];
      const cx2 = (t.clientX - rect.left) * scaleX, cy2 = (t.clientY - rect.top) * scaleY;
      touch.dx = clamp((cx2 - touch.sx) / 50, -1, 1);
      touch.dy = clamp((cy2 - touch.sy) / 50, -1, 1);
    }, { passive: false });
    cv.addEventListener('touchend', e => {
      e.preventDefault();
      touch.active = false; touch.dx = 0; touch.dy = 0;
      // tap E to fix lamp
      if (st === S.PLAY) fixLamp();
    }, { passive: false });

    // ── START ──────────────────────────────────────────────
    requestAnimationFrame(loop);
  </script>
</body>

</html>
