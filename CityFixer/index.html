<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>City Fixer - SDG 11</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: #05080f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden
    }

    canvas {
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(64, 195, 240, 0.25)
    }

    #hint {
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
      margin-top: 10px;
      letter-spacing: 1px
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <div id="hint">WASD = Gerak &nbsp;|&nbsp; E = Lampu &nbsp;|&nbsp; F = Buang Sampah &nbsp;|&nbsp; SPACE = Mulai &nbsp;|&nbsp; ESC = Pause &nbsp;|&nbsp; M = Menu</div>
  <script>
    const cv = document.getElementById('c'), cx = cv.getContext('2d');
    const W = 1100, H = 620; cv.width = W; cv.height = H;

    // ── AUDIO (Web Audio API) ──────────────────────────────
    const AC = new (window.AudioContext || window.webkitAudioContext)();
    document.addEventListener('click', () => { if (AC.state === 'suspended') AC.resume(); });

    // ── PRELOAD ASET ──────────────────────────────────────
    const monsterImg = new Image();
    monsterImg.src = '../aset/monster-removebg-preview.png';
    // Preload aset sampah
    const trashImgs = [new Image(), new Image(), new Image()];
    trashImgs[0].src = '../aset/sampah/sampah1.png';
    trashImgs[1].src = '../aset/sampah/sampah2.png';
    trashImgs[2].src = '../aset/sampah/sampah3.png';

    const beep = (f, d, t = 'sine', v = .3, isMusic = false) => {
      const actualV = v * (isMusic ? (typeof volMusic !== 'undefined' ? volMusic : 0.7) : (typeof volSfx !== 'undefined' ? volSfx : 0.8));
      if (actualV <= 0) return;
      const o = AC.createOscillator(), g = AC.createGain(); o.connect(g); g.connect(AC.destination); o.frequency.value = f; o.type = t;
      g.gain.setValueAtTime(actualV, AC.currentTime); g.gain.exponentialRampToValueAtTime(.001, AC.currentTime + d); o.start(); o.stop(AC.currentTime + d);
    };
    const sfxCollect = () => { beep(880, .08); setTimeout(() => beep(1100, .12), 70); };
    const sfxLamp = () => { beep(660, .08); setTimeout(() => beep(880, .08), 90); setTimeout(() => beep(1320, .2), 190); };
    const sfxHit = () => beep(100, .35, 'sawtooth', .5);
    const sfxWin = () => [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, .4), i * 150));
    const sfxLose = () => [440, 349, 294, 220].forEach((f, i) => setTimeout(() => beep(f, .3), i * 100));
    // Monster mati - sfx ringan
    const sfxMonsterDie = () => beep(220, .15, 'square', .3);
    // Monster makan warga - sfx ringan
    const sfxMonsterEat = () => beep(180, .1, 'square', .25);
    let bgmInt = null;
    const playBGM = () => {
      if (bgmInt) clearInterval(bgmInt);
      const seq = [
        261.63, 329.63, 392.00, 523.25, // C E G C
        349.23, 440.00, 523.25, 698.46, // F A C F
        392.00, 493.88, 587.33, 783.99, // G B D G
        261.63, 329.63, 392.00, 523.25  // C E G C
      ];
      let i = 0;
      bgmInt = setInterval(() => {
        if (st === S.PLAY) {
          beep(seq[i] / 2, 0.15, 'triangle', 0.1, true); // Bass
          if (i % 2 === 0) beep(seq[i], 0.2, 'sine', 0.05, true); // Arp
          i = (i + 1) % seq.length;
        }
      }, 200);
    };

    // ── STATE ──────────────────────────────────────────────
    const S = { MENU: 0, PLAY: 1, WIN: 2, LOSE: 3, PAUSE: 4 };
    let st = S.MENU, score, lives, timer, flash, flashT, lastT = 0, level = 1;
    let floats = [], shakeX = 0, shakeY = 0, shakeT = 0, shakeM = 8, combo = 0, comboT = 0;
    let highscore = parseInt(localStorage.getItem('cf_hs') || '0');
    let difficulty = 1;
    const DIFF_SPEED = [0.7, 1.0, 1.4]; // mudah, normal, susah
    const doShake = (t, m) => { shakeT = t; shakeM = m; };
    const addFloat = (x, y, t, c) => floats.push({ x, y, vy: -55, life: 1.5, txt: t, col: c });
    const spawnConfetti = () => { for (let i = 0; i < 90; i++)parts.push({ x: rand(0, W), y: rand(-100, 0), vx: rand(-30, 30), vy: rand(80, 200), life: 3 + rand(0, 2), r: 5 + rand(0, 4), col: `hsl(${~~rand(0, 360)},90%,60%)`, conf: true }); };

    // ── INPUT ──────────────────────────────────────────────
    const K = {};
    addEventListener('keydown', e => {
      K[e.code] = true; e.preventDefault();
      if (e.code === 'KeyE') fixLamp();
      if (e.code === 'KeyF') depositTrash();
      if (e.code === 'KeyM') { goToMenu(); }
      if (e.code === 'Escape') {
        if (st === S.PLAY) st = S.PAUSE;
        else if (st === S.PAUSE) { st = S.PLAY; lastT = performance.now(); }
        else if (st === S.WIN || st === S.LOSE) goToMenu();
      }
      if (e.code === 'Space' || e.code === 'Enter') {
        if (st === S.MENU || st === S.WIN || st === S.LOSE) init(st !== S.PAUSE);
        if (st === S.PAUSE) { st = S.PLAY; lastT = performance.now(); }
      }
    });
    addEventListener('keyup', e => K[e.code] = false);

    // ── ENTITIES ───────────────────────────────────────────
    let P, trash, lamps, cars, parts, npcs, pollClouds, raindrops, powerups, heartups, bullets, gunups, bins;
    let heartTimer = 0;

    // Kategori sampah
    const TRASH_CAT   = ['organik', 'plastik', 'logam'];       // per type
    const BIN_LABEL   = { organik: 'Organik', plastik: 'Plastik', logam: 'Logam/Kaleng' };
    const BIN_COLOR   = { organik: '#4caf50', plastik: '#ffd740', logam: '#42a5f5' };
    const BIN_DARK    = { organik: '#2e7d32', plastik: '#f57f17', logam: '#1565c0' };
    const BAG_MAX     = 5; // maks sampah dalam tas
    let mousePos = { x: 0, y: 0 };
    const cv2 = document.getElementById('c');
    cv2.addEventListener('mousemove', e => {
      const r = cv2.getBoundingClientRect();
      mousePos.x = (e.clientX - r.left) * (cv2.width / r.width);
      mousePos.y = (e.clientY - r.top)  * (cv2.height / r.height);
    });
    cv2.addEventListener('click', e => {
      if (st !== S.PLAY || !P || !P.hasGun || P.ammo <= 0) return;
      const r = cv2.getBoundingClientRect();
      const mx = (e.clientX - r.left) * (cv2.width / r.width);
      const my = (e.clientY - r.top)  * (cv2.height / r.height);
      const ang = Math.atan2(my - P.y, mx - P.x);
      const spd = 430;
      bullets.push({ x: P.x, y: P.y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, life: 2.5, r: 5 });
      P.ammo--;
      if (P.ammo <= 0) P.hasGun = false;
      beep(900, .04, 'square', .4);
      setTimeout(() => beep(650, .05, 'square', .3), 40);
    });

    function goToMenu() { if (bgmInt) clearInterval(bgmInt); bgmInt = null; st = S.MENU; }

    const LEVELS = [
      { name: 'LEVEL 1: SIANG CERAH', time: 40, skyColor: '#4CA1AF', buildingBase: [100, 140, 180], overlay: 'rgba(0,0,0,0)', rain: false, cloudRate: 0.001 },
      { name: 'LEVEL 2: SORE BERPOLUSI', time: 40, skyColor: '#ff7b54', buildingBase: [90, 60, 50], overlay: 'rgba(40,15,0,0.25)', rain: false, cloudRate: 0.003 },
      { name: 'LEVEL 3: MALAM KELAM', time: 45, skyColor: '#07091a', buildingBase: [20, 25, 35], overlay: 'rgba(8,12,25,0.6)', rain: false, cloudRate: 0.005 },
      { name: 'LEVEL 4: HUJAN BADAI', time: 45, skyColor: '#1a2530', buildingBase: [25, 30, 35], overlay: 'rgba(5,10,20,0.7)', rain: true, cloudRate: 0.006 },
      { name: 'LEVEL 5: PUSAT POLUSI', time: 50, skyColor: '#300010', buildingBase: [35, 10, 10], overlay: 'rgba(40,0,10,0.65)', rain: true, cloudRate: 0.008 }
    ];

    let currentLevelIdx = 0;
    let levelData = LEVELS[0];
    let bldg = [];

    function init(fullReset = false) {
      AC.resume();
      if (fullReset) { score = 0; lives = 3; currentLevelIdx = 0; }
      levelData = LEVELS[currentLevelIdx];
      st = S.PLAY; flash = ''; flashT = 0; lastT = performance.now(); level = currentLevelIdx + 1;
      timer = levelData.time;
      // playBGM(); // BGM dimatikan - hanya SFX
      floats = []; combo = 0; comboT = 0; shakeX = 0; shakeY = 0;
      P = { x: W / 2, y: 260, vx: 0, vy: 0, r: 16, inv: 0, blink: true, bt: 0, facingDir: 1, bobT: 0, superT: 0, hasGun: false, ammo: 0, bag: [] };
      trash = []; lamps = []; cars = []; parts = []; npcs = []; pollClouds = []; raindrops = []; powerups = []; heartups = []; bullets = []; gunups = []; bins = [];

      heartTimer = 0;

      generateMap();

      const ds = DIFF_SPEED[difficulty];
      [
        { h: true, x: 0, y: 130, spd: 130 * ds, col: '#e53935' },
        { h: true, x: W, y: 260, spd: -155 * ds, col: '#1e88e5' },
        { h: true, x: 0, y: 390, spd: 120 * ds, col: '#43a047' },
        { h: true, x: W, y: 520, spd: -140 * ds, col: '#fb8c00' },
      ].forEach(v => cars.push({ ...v, w: 54, ht: 26 }));
      for (let i = 0; i < 4; i++) spawnNPC();
      for (let i = 0; i < 2; i++) spawnPollCloud();
      spawnTrash(6);
      requestAnimationFrame(loop);
    }

    function generateMap() {
      bldg = []; lamps = [];
      // Row bangunan dengan tinggi lebih pendek agar area jalan lebih lega
      const rows = [
        { y: 35,  h: 65 },   // atas jalan 1
        { y: 180, h: 55 },   // bawah jalan 1 / atas jalan 2
        { y: 315, h: 55 },   // bawah jalan 2 / atas jalan 3
        { y: 445, h: 55 },   // bawah jalan 3 / atas jalan 4
        { y: 550, h: 50 },   // bawah jalan 4
      ];
      rows.forEach(r => {
        let curX = rand(30, 80); // mulai lebih ke tengah agar pinggir layar selalu bisa dilewati
        while (curX < W - 100) {
          let bw = rand(65, 110); // bangunan lebih kecil
          if (curX + bw > W - 60) break; // jangan sampai mentok kanan
          bldg.push([curX, r.y, bw, r.h]);
          curX += bw + rand(120, 170); // celah minimum 120px (player diameter ~32px, jadi sangat cukup)
        }
      });

      // Hapus bangunan yang terlalu mepet satu sama lain (gap < 90px) di baris yang sama
      bldg = bldg.filter((b, i) => {
        const [bx, by, bw] = b;
        // Cek apakah bangunan kiri dari bangunan ini terlalu dekat
        const tooClose = bldg.some((b2, j) => {
          if (j === i) return false;
          const [b2x, b2y, b2w] = b2;
          if (Math.abs(b2y - by) > 10) return false; // hanya cek row yang sama
          const gapRight = bx - (b2x + b2w);
          return gapRight > 0 && gapRight < 90;
        });
        return !tooClose;
      });

      const streetsY = [130, 260, 390, 520];
      // Tempatkan lampu di pinggir jalan, cek tidak di dalam bangunan
      const lampXPositions = [150, 380, 610, 840];
      streetsY.forEach(sy => {
        lampXPositions.forEach(lx => {
          if (Math.random() < 0.75) {
            const lxFinal = lx + rand(-15, 15);
            const inBldg = bldg.some(([bx, by, bw, bh]) =>
              lxFinal > bx - 12 && lxFinal < bx + bw + 12 &&
              sy > by - 30 && sy < by + bh + 5
            );
            if (!inBldg) {
              lamps.push({ x: lxFinal, y: sy, fixed: false, pulse: rand(0, 6.28), life: 0, flickerT: rand(0, 10) });
            }
          }
        });
      });

      // 3 kotak sampah di posisi terpisah jauh, tidak dempet
      const binSpots = [
        { x: 100,       y: H - 65 },   // kiri bawah
        { x: W / 2,     y: 65 },       // tengah atas
        { x: W - 100,   y: H - 65 },   // kanan bawah
      ];
      const binTypes = ['organik', 'plastik', 'logam'];
      binSpots.forEach((pos, i) => {
        bins.push({ x: pos.x, y: pos.y, type: binTypes[i], r: 22, pulse: 0 });
      });
    }

    function spawnNPC() {
      let x, y, ok;
      do {
        x = rand(60, W - 60); y = rand(60, H - 60);
        ok = dist(x, y, W / 2, H / 2) > 80;
        if (bldg.some(([bx, by, bw, bh]) => x + 11 > bx && x - 11 < bx + bw && y + 11 > by - 25 && y - 11 < by + bh)) ok = false;
      } while (!ok);
      npcs.push({ x, y, r: 11, vx: 0, vy: 0, scared: false, scaredT: 0, tx: x, ty: y, wt: rand(1, 3), col: `hsl(${~~rand(20, 340)},70%,65%)`, capCol: `hsl(${~~rand(0, 360)},75%,55%)`, facingDir: 1, bobT: rand(0, 10) });
    }

    function spawnPollCloud() {
      const side = Math.floor(rand(0, 4));
      let x, y;
      if (side === 0) { x = rand(50, W - 50); y = -40; }
      else if (side === 1) { x = rand(50, W - 50); y = H + 40; }
      else if (side === 2) { x = -40; y = rand(50, H - 50); }
      else { x = W + 40; y = rand(50, H - 50); }
      pollClouds.push({ x, y, r: 22, vx: 0, vy: 0, pulse: rand(0, 6.28), hp: 3, hitT: 0 });
    }

    function spawnTrash(n = 1) {
      for (let i = 0; i < n; i++) {
        let x, y, ok;
        do {
          x = rand(70, W - 70); y = rand(80, H - 80);
          ok = dist(x, y, W / 2, H / 2) > 70;
          if (bldg.some(([bx, by, bw, bh]) => x + 13 > bx && x - 13 < bx + bw && y + 13 > by - 25 && y - 13 < by + bh)) ok = false;
        } while (!ok);
        trash.push({ x, y, r: 13, bob: rand(0, 6.28), type: Math.floor(rand(0, 3)) });
      }
    }

    function spawnPowerup() {
      if (powerups.length > 0) return;
      let x, y, ok;
      do {
        x = rand(100, W - 100); y = rand(100, H - 100); ok = true;
        if (bldg.some(([bx, by, bw, bh]) => x + 16 > bx && x - 16 < bx + bw && y + 16 > by - 25 && y - 16 < by + bh)) ok = false;
      } while (!ok);
      powerups.push({ x, y, r: 16, bob: rand(0, 6.28) });
    }

    function spawnGunup() {
      if (gunups.length > 0) return;
      let x, y, ok;
      do {
        x = rand(100, W - 100); y = rand(100, H - 100); ok = true;
        if (bldg.some(([bx, by, bw, bh]) => x+14>bx && x-14<bx+bw && y+14>by-25 && y-14<by+bh)) ok = false;
      } while (!ok);
      gunups.push({ x, y, r: 14, bob: rand(0, 6.28) });
    }

    function spawnHeartup() {
      if (heartups.length >= 2) return;
      let x, y, ok;
      do {
        x = rand(100, W - 100); y = rand(100, H - 100); ok = true;
        if (bldg.some(([bx, by, bw, bh]) => x + 14 > bx && x - 14 < bx + bw && y + 14 > by - 25 && y - 14 < by + bh)) ok = false;
      } while (!ok);
      heartups.push({ x, y, r: 14, bob: rand(0, 6.28) });
    }

    // ── LOOP ───────────────────────────────────────────────
    function loop(ts) {
      const dt = Math.min((ts - lastT) / 1000, 0.05); lastT = ts;
      if (st === S.PLAY) {
        update(dt);
        if (timer <= 0) endGame(true);
      }
      draw();
      requestAnimationFrame(loop);
    }

    // ── UPDATE ─────────────────────────────────────────────
    function update(dt) {
      timer -= dt;

      if (P.superT > 0) {
        P.superT -= dt;
        if (P.superT <= 0) P.superT = 0;
      }

      lamps.forEach(l => {
        if (l.fixed) {
          l.life -= dt * (2.5 + level * 0.5);
          if (l.life <= 0) {
            l.fixed = false;
            sfxLose();
          }
        }
      });

      if (flashT > 0) flashT -= dt;

      let dx = 0, dy = 0;
      if (K.KeyW || K.ArrowUp) dy = -1;
      if (K.KeyS || K.ArrowDown) dy = 1;
      if (K.KeyA || K.ArrowLeft) { dx = -1; }
      if (K.KeyD || K.ArrowRight) { dx = 1; }
      if (touch.active) { dx += touch.dx; dy += touch.dy; }
      const mag = Math.hypot(dx, dy); if (mag > 1) { dx /= mag; dy /= mag; }

      // Smooth acceleration / deceleration
      const maxSpd = 220;
      const accel = (dx !== 0 || dy !== 0) ? 13 : 20;
      P.vx += (dx * maxSpd - P.vx) * Math.min(accel * dt, 1);
      P.vy += (dy * maxSpd - P.vy) * Math.min(accel * dt, 1);
      if (Math.abs(P.vx) < 1.5 && dx === 0) P.vx = 0;
      if (Math.abs(P.vy) < 1.5 && dy === 0) P.vy = 0;

      // Update facing direction
      if (dx < 0) P.facingDir = -1;
      else if (dx > 0) P.facingDir = 1;

      let nextX = P.x + P.vx * dt;
      let nextY = P.y + P.vy * dt;

      const collide = bldg.some(([bx, by, bw, bh]) =>
        nextX + P.r > bx && nextX - P.r < bx + bw &&
        nextY + P.r > by - 25 && nextY - P.r < by + bh
      );

      if (!collide) {
        P.x = clamp(nextX, P.r + 8, W - P.r - 8);
        P.y = clamp(nextY, P.r + 8, H - P.r - 8);
      } else {
        const collX = bldg.some(([bx, by, bw, bh]) =>
          nextX + P.r > bx && nextX - P.r < bx + bw &&
          P.y + P.r > by - 25 && P.y - P.r < by + bh
        );
        if (!collX) P.x = clamp(nextX, P.r + 8, W - P.r - 8);

        const collY = bldg.some(([bx, by, bw, bh]) =>
          P.x + P.r > bx && P.x - P.r < bx + bw &&
          nextY + P.r > by - 25 && nextY - P.r < by + bh
        );
        if (!collY) P.y = clamp(nextY, P.r + 8, H - P.r - 8);
      }

      if (P.inv > 0) {
        P.inv -= dt; P.bt += dt;
        if (P.bt > .1) { P.blink = !P.blink; P.bt = 0; }
        if (P.inv <= 0) P.blink = true;
      }

      cars.forEach(c => {
        if (c.h) c.x += c.spd * dt; else c.y += c.spd * dt;
        if (c.x > W + 60) c.x = -60; if (c.x < -60) c.x = W + 60;
        if (c.y > H + 60) c.y = -60; if (c.y < -60) c.y = H + 60;
        if (Math.random() < .25) {
          let ex = c.h ? c.x - Math.sign(c.spd) * c.w / 2 : c.x + rand(-8, 8);
          let ey = c.h ? c.y + rand(-6, 6) : c.y - Math.sign(c.spd) * c.ht / 2;
          parts.push({ x: ex, y: ey, vx: rand(-20, 20), vy: rand(-30, -10), life: .7, r: 4, col: 'rgba(180,180,180,0.6)' });
        }
        if (P.inv <= 0 && rectCircle(c.x - c.w / 2, c.y - c.ht / 2, c.w, c.ht, P.x, P.y, P.r)) {
          lives--; sfxHit(); doShake(.4, 10); combo = 0;
          setFlash('Kena Polusi!', 'red');
          P.inv = 2; P.blink = true;
          burst(P.x, P.y, '#f44336', 18);
          if (lives <= 0) endGame(false);
        }
      });

      // Pungut sampah → masuk tas (bag)
      trash = trash.filter(t => {
        if (dist(P.x, P.y, t.x, t.y) < P.r + t.r) {
          if (P.bag.length >= BAG_MAX) {
            setFlash('Tas Penuh! Buang ke Kotak Dulu (F)', '#ff9800');
            return true; // jangan ambil
          }
          P.bag.push(t.type);
          sfxCollect();
          const catName = BIN_LABEL[TRASH_CAT[t.type]];
          addFloat(t.x, t.y - 10, catName, BIN_COLOR[TRASH_CAT[t.type]]);
          burst(t.x, t.y, BIN_COLOR[TRASH_CAT[t.type]], 8);
          return false;
        }
        return true;
      });
      if (trash.length < 5 && Math.random() < .01) spawnTrash(1);

      if (Math.random() < 0.001) spawnPowerup();
      powerups = powerups.filter(pu => {
        if (dist(P.x, P.y, pu.x, pu.y) < P.r + pu.r) {
          P.superT = 10;
          setFlash('SUPER MODE!', '#00ffcc');
          sfxWin();
          return false;
        }
        return true;
      });

      // Gun pickup spawn
      if (Math.random() < 0.0004) spawnGunup();
      gunups = gunups.filter(gu => {
        if (dist(P.x, P.y, gu.x, gu.y) < P.r + gu.r) {
          P.hasGun = true; P.ammo = 8;
          setFlash('Dapat Semprotan! (8x)', '#00e5ff');
          sfxLamp(); burst(gu.x, gu.y, '#00e5ff', 14);
          addFloat(gu.x, gu.y, '+Semprotan!', '#00e5ff');
          return false;
        }
        return true;
      });

      // Heart pickup - spawn every 10 seconds, collect = +1 life (max 5)
      heartTimer += dt;
      if (heartTimer >= 10) { spawnHeartup(); heartTimer = 0; }
      heartups = heartups.filter(hu => {
        if (dist(P.x, P.y, hu.x, hu.y) < P.r + hu.r) {
          lives = Math.min(lives + 1, 5);
          setFlash('+1 Nyawa!', '#ff4081');
          sfxCollect(); burst(hu.x, hu.y, '#ff4081', 12);
          return false;
        }
        return true;
      });

      // Update bullets
      bullets.forEach(b => { b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt; });
      const hitPcs = new Set();
      bullets = bullets.filter(b => {
        if (b.life <= 0 || b.x < 0 || b.x > W || b.y < 0 || b.y > H) return false;
        let hit = false;
        pollClouds.forEach(pc => {
          if (!hitPcs.has(pc) && dist(b.x, b.y, pc.x, pc.y) < pc.r + b.r) {
            pc.hp--; pc.hitT = 0.35;
            burst(b.x, b.y, '#00e5ff', 6);
            addScore(25); addFloat(b.x, b.y - 10, '+25', '#00e5ff');
            if (pc.hp <= 0) { sfxMonsterDie(); pc._dead = true; hitPcs.add(pc); }
            hit = true;
          }
        });
        return !hit;
      });

      parts.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; if (!p.conf) p.vy += 60 * dt; p.life -= dt; });
      parts = parts.filter(p => p.life > 0);

      const fixedLamps = lamps.filter(l => l.fixed);
      const superMode = (P.superT > 0);

      npcs.forEach(n => {
        let scared = false;
        let targetCloud = null, cd = Infinity;
        pollClouds.forEach(pc => {
          const d = dist(n.x, n.y, pc.x, pc.y);
          if (d < 140) { scared = true; }
          if (d < cd) { cd = d; targetCloud = pc; }
        });
        n.scared = scared && !superMode;
        if (n.scared) { n.scaredT = 1.5; }
        else if (n.scaredT > 0) { n.scaredT -= dt; }

        if (superMode && targetCloud) {
          n.tx = targetCloud.x + rand(-10, 10);
          n.ty = targetCloud.y + rand(-10, 10);
        } else if (n.scared && fixedLamps.length > 0) {
          let best = fixedLamps[0], bd = dist(n.x, n.y, best.x, best.y);
          fixedLamps.forEach(l => { const d = dist(n.x, n.y, l.x, l.y); if (d < bd) { bd = d; best = l; } });
          n.tx = best.x + rand(-20, 20); n.ty = best.y + rand(-20, 20);
        } else if (!n.scared) {
          n.wt -= dt;
          if (n.wt <= 0) { n.tx = rand(60, W - 60); n.ty = rand(60, H - 60); n.wt = rand(2, 5); }
        }
        const ddx = n.tx - n.x, ddy = n.ty - n.y, dm = Math.hypot(ddx, ddy);
        const spd = n.scared ? 110 : 55;
        if (dm > 5) {
          n.vx = ddx / dm * spd; n.vy = ddy / dm * spd;
          n.tAng = Math.atan2(n.vy, n.vx);
        } else { n.vx = 0; n.vy = 0; }

        let nNextX = n.x + n.vx * dt;
        let nNextY = n.y + n.vy * dt;
        const nCollide = bldg.some(([bx, by, bw, bh]) =>
          nNextX + n.r > bx && nNextX - n.r < bx + bw &&
          nNextY + n.r > by - 25 && nNextY - n.r < by + bh
        );
        if (!nCollide) {
          n.x = clamp(nNextX, n.r + 4, W - n.r - 4);
          n.y = clamp(nNextY, n.r + 4, H - n.r - 4);
        } else {
          const collX = bldg.some(([bx, by, bw, bh]) =>
            nNextX + n.r > bx && nNextX - n.r < bx + bw &&
            n.y + n.r > by - 25 && n.y - n.r < by + bh
          );
          if (!collX) { n.x = clamp(nNextX, n.r + 4, W - n.r - 4); n.ty = n.y; }

          const collY = bldg.some(([bx, by, bw, bh]) =>
            n.x + n.r > bx && n.x - n.r < bx + bw &&
            nNextY + n.r > by - 25 && nNextY - n.r < by + bh
          );
          if (!collY) { n.y = clamp(nNextY, n.r + 4, H - n.r - 4); n.tx = n.x; }

          if (collX && collY) {
            n.tx = rand(60, W - 60); n.ty = rand(60, H - 60);
          }
        }

        // Track NPC facing direction
        if (n.vx < -5) n.facingDir = -1;
        else if (n.vx > 5) n.facingDir = 1;
        n.facingDir = n.facingDir || 1;
      });

      pollClouds.forEach(pc => {
        pc.hitT = Math.max(0, pc.hitT - dt);
        pc.pulse += dt * 2;
        let target = null, td = Infinity;
        npcs.forEach(n => {
          const safe = fixedLamps.some(l => dist(n.x, n.y, l.x, l.y) < 88);
          if (!safe) { const d = dist(pc.x, pc.y, n.x, n.y); if (d < td) { td = d; target = n; } }
        });
        let repX = 0, repY = 0;
        fixedLamps.forEach(l => {
          const d = dist(pc.x, pc.y, l.x, l.y);
          if (d < 110) {
            repX += (pc.x - l.x) / d * (110 - d);
            repY += (pc.y - l.y) / d * (110 - d);
          }
        });
        const cspd = 55 + level * 10;
        if (target) {
          let ax = (target.x - pc.x), ay = (target.y - pc.y), am = Math.hypot(ax, ay) || 1;
          pc.vx = (ax / am * cspd) + repX * 0.9;
          pc.vy = (ay / am * cspd) + repY * 0.9;
        } else {
          let ax = (P.x - pc.x), ay = (P.y - pc.y), am = Math.hypot(ax, ay) || 1;
          pc.vx = (ax / am * cspd * 0.7) + repX * 0.9;
          pc.vy = (ay / am * cspd * 0.7) + repY * 0.9;
        }
        const vm = Math.hypot(pc.vx, pc.vy) || 1;
        const maxSpd = cspd * 1.5;
        if (vm > maxSpd) { pc.vx = pc.vx / vm * maxSpd; pc.vy = pc.vy / vm * maxSpd; }

        pc.x += pc.vx * dt;
        pc.y += pc.vy * dt;

        if (pc.x < -60) pc.x = W + 60; if (pc.x > W + 60) pc.x = -60;
        if (pc.y < -60) pc.y = H + 60; if (pc.y > H + 60) pc.y = -60;
        npcs.forEach(n => {
          const safe = fixedLamps.some(l => dist(n.x, n.y, l.x, l.y) < 88);
          if (dist(pc.x, pc.y, n.x, n.y) < pc.r + n.r) {
            if (superMode) {
              pc.hp -= 100; burst(pc.x, pc.y, '#c060ff', 25);
              addScore(50);
              sfxLamp();
            } else if (!safe) {
              n._dead = true;
              sfxMonsterEat(); // suara monster makan warga
              score = Math.max(0, score - 20);
              setFlash('Warga Terpapar!', 'orange');
              burst(n.x, n.y, '#ff9800', 10);
              doShake(0.3, 7);
              setTimeout(spawnNPC, 3000);
            }
          }
        });
        if (dist(P.x, P.y, pc.x, pc.y) < P.r + pc.r - 4) {
          if (superMode) {
            pc.hp -= 100; burst(pc.x, pc.y, '#c060ff', 25);
            addScore(50);
            sfxLamp();
          } else if (P.inv <= 0) {
            lives--; sfxHit(); doShake(.4, 10); combo = 0;
            setFlash('Terpapar!', 'red');
            P.inv = 2; P.blink = true;
            burst(P.x, P.y, '#f44336', 18);
            if (lives <= 0) endGame(false);
          }
        }
        if (pc.hp <= 0) { sfxMonsterDie(); pc._dead = true; } // suara monster mati
      });
      pollClouds = pollClouds.filter(pc => !pc._dead);
      npcs = npcs.filter(n => !n._dead);
      if (pollClouds.length < 2 + level && Math.random() < levelData.cloudRate) spawnPollCloud();

      // Player panic detection - wajah panik kalau monster dekat
      P.scared = P.superT <= 0 && pollClouds.some(pc => dist(P.x, P.y, pc.x, pc.y) < 160);

      if (shakeT > 0) { shakeT -= dt; shakeX = (Math.random() - .5) * shakeM * 2; shakeY = (Math.random() - .5) * shakeM * 2; } else { shakeX = 0; shakeY = 0; }
      if (comboT > 0) { comboT -= dt; } else { combo = 0; }
      floats.forEach(f => { f.y += f.vy * dt; f.life -= dt; }); floats = floats.filter(f => f.life > 0);

      if (levelData.rain) {
        if (!raindrops) raindrops = [];
        for (let i = 0; i < 6; i++) {
          raindrops.push({ x: rand(-200, W + 200), y: rand(-50, 0), l: rand(10, 25), s: rand(600, 900) });
        }
        raindrops.forEach(r => { r.y += r.s * dt; r.x += r.s * 0.15 * dt; });
        raindrops = raindrops.filter(r => r.y < H + 50);
      }
    }

    function fixLamp() {
      if (st !== S.PLAY) return;
      lamps.forEach(l => {
        if (!l.fixed && dist(P.x, P.y, l.x, l.y) < 75) {
          l.fixed = true; l.life = 100; sfxLamp();
          addScore(30);
          addFloat(l.x, l.y, '+30', '#ffd740');
          burst(l.x, l.y, '#ffd740', 12);
        } else if (l.fixed && dist(P.x, P.y, l.x, l.y) < 75 && l.life < 50) {
          l.life = 100; sfxCollect();
          addScore(10);
          addFloat(l.x, l.y, '+10', '#ffd740');
        }
      });
    }

    function depositTrash() {
      if (st !== S.PLAY || !P || P.bag.length === 0) return;
      // Cari kotak sampah terdekat
      let closest = null, cd = Infinity;
      bins.forEach(b => {
        const d = dist(P.x, P.y, b.x, b.y);
        if (d < 70 && d < cd) { cd = d; closest = b; }
      });
      if (!closest) {
        setFlash('Dekati Kotak Sampah Dulu!', '#ff9800');
        return;
      }
      // Buang semua sampah dari tas yang cocok dengan kotak ini
      const binCat = closest.type;
      let correct = 0, wrong = 0;
      const newBag = [];
      P.bag.forEach(type => {
        if (TRASH_CAT[type] === binCat) {
          correct++;
        } else {
          wrong++;
          newBag.push(type); // kembalikan ke tas
        }
      });
      P.bag = newBag;
      if (correct > 0) {
        const pts = correct * 40;
        addScore(pts);
        combo += correct; comboT = 2.5;
        sfxWin();
        burst(closest.x, closest.y, BIN_COLOR[binCat], correct * 6);
        closest.pulse = 1; // animasi bin
        addFloat(closest.x, closest.y - 30, '+' + pts + ' (' + correct + ' sampah!)', BIN_COLOR[binCat]);
        setFlash('Benar! +' + pts + ' Poin 🎉', BIN_COLOR[binCat]);
      }
      if (wrong > 0) {
        addScore(-wrong * 10);
        sfxHit();
        addFloat(closest.x, closest.y - 10, '-' + (wrong*10) + ' Salah Kotak!', '#ff5252');
        if (correct === 0) setFlash('Salah Kotak! -' + (wrong*10), '#ff5252');
      }
    }

    function addScore(v) {
      score = Math.max(0, score + v);
      if (score > highscore) { highscore = score; localStorage.setItem('cf_hs', highscore); }
    }

    let panelWin = false;
    function endGame(win) {
      panelWin = win;
      st = win ? S.WIN : S.LOSE;
      if (win) {
        sfxWin(); setTimeout(spawnConfetti, 200);
      } else { sfxLose(); }
    }

    function setFlash(msg, col) { flash = msg; flashCol = col; flashT = 2; }
    let flashCol = '#fff';

    // ── DRAW ───────────────────────────────────────────────
    function draw() {
      cx.clearRect(0, 0, W, H);
      if (st === S.MENU) { drawMenu(); return; }
      cx.save(); cx.translate(shakeX, shakeY);
      drawBg(); drawBins(); drawLamps(); drawNPCs(); drawPollClouds(); drawPowerups(); drawHeartups(); drawGunups(); drawTrash(); drawCars(); drawParts(); drawBullets(); drawPlayer();
      drawLighting();

      if (levelData.rain && raindrops) {
        cx.strokeStyle = 'rgba(180, 210, 255, 0.35)';
        cx.lineWidth = 1.5;
        cx.beginPath();
        raindrops.forEach(r => {
          cx.moveTo(r.x, r.y);
          cx.lineTo(r.x + r.l * 0.15, r.y + r.l);
        });
        cx.stroke();
      }

      cx.restore();
      drawHUD(); drawFloats();
      if (flashT > 0) drawFlash();
      if (st === S.WIN || st === S.LOSE) drawPanel(st === S.WIN);
      if (st === S.PAUSE) drawPause();
    }

    function drawPause() {
      cx.fillStyle = 'rgba(7,9,26,0.78)'; cx.fillRect(0, 0, W, H);
      cx.fillStyle = '#fff'; cx.font = 'bold 44px Segoe UI'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
      cx.fillText('PAUSE', W / 2, H / 2 - 40);
      cx.font = '18px Segoe UI'; cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.fillText('ESC / SPACE = Lanjut', W / 2, H / 2 + 5);
    }

    function drawCharacter(x, y, vx, vy, bobT, colBody, colSkin, isPlayer, scared, facingDir, superMode, capCol) {
      cx.save();
      cx.translate(x, y);
      const isMoving = Math.abs(vx) > 5 || Math.abs(vy) > 5;
      const dir = facingDir || 1;
      const w = bobT;

      // Walk cycle - directional aware
      const isMovingH = Math.abs(vx) > Math.abs(vy) + 10; // primarily horizontal
      const isMovingV = Math.abs(vy) > Math.abs(vx) + 10 && isMoving; // primarily vertical
      const legSwing = isMovingH ? Math.sin(w) * 7 : (isMovingV ? Math.sin(w) * 2.5 : 0);
      const legLift  = isMovingH ? Math.abs(Math.sin(w)) * 5 : (isMovingV ? Math.abs(Math.sin(w * 2)) * 4 : 0);
      const armSwing = isMovingH ? Math.sin(w) * 5 : (isMovingV ? Math.sin(w) * 1.5 : 0);
      const bodyBob  = isMoving ? -Math.abs(Math.sin(w)) * 2.2 + 0.5 : Math.sin(w * 0.4) * 0.4;
      // Body lean forward when moving horizontally
      const lean = isMovingH ? dir * 0.07 : 0;

      // Ground shadow
      cx.fillStyle = 'rgba(0,0,0,0.22)';
      cx.beginPath(); cx.ellipse(0, 18, 14, 4, 0, 0, Math.PI * 2); cx.fill();

      cx.translate(0, bodyBob - 2);
      if (lean !== 0) cx.rotate(lean); // forward lean

      if (superMode) { cx.shadowBlur = 26; cx.shadowColor = '#00ffcc'; }
      else if (isPlayer) { cx.shadowBlur = 14; cx.shadowColor = 'rgba(64,195,240,0.6)'; }

      cx.scale(dir, 1);

      // ── BACK LEG ──
      cx.save(); cx.translate(-4 - legSwing * 0.5, 9 + legLift * 0.2);
      cx.fillStyle = '#37474f';
      cx.beginPath(); cx.roundRect(-3.5, 0, 7, 9, 2); cx.fill();
      cx.fillStyle = '#1a237e';
      cx.beginPath(); cx.roundRect(-4.5, 8, 9, 4, [0, 0, 2, 2]); cx.fill();
      cx.restore();

      // ── FRONT LEG ──
      cx.save(); cx.translate(4 + legSwing * 0.5, 9 - legLift);
      cx.fillStyle = '#455a64';
      cx.beginPath(); cx.roundRect(-3.5, 0, 7, 9, 2); cx.fill();
      cx.fillStyle = '#283593';
      cx.beginPath(); cx.roundRect(-4.5, 8, 9, 4, [0, 0, 2, 2]); cx.fill();
      cx.restore();

      cx.shadowBlur = 0;

      // ── BODY ──
      cx.fillStyle = colBody;
      cx.beginPath(); cx.roundRect(-11, -6, 22, 18, 7); cx.fill();
      // Shirt collar highlight
      cx.fillStyle = 'rgba(255,255,255,0.18)';
      cx.beginPath(); cx.roundRect(-8, -6, 16, 6, [5,5,0,0]); cx.fill();
      // Belt/waist line
      cx.fillStyle = 'rgba(0,0,0,0.18)';
      cx.beginPath(); cx.roundRect(-11, 9, 22, 3, 1); cx.fill();

      // ── BACK ARM ──
      cx.save(); cx.translate(-13, -1);
      cx.fillStyle = colBody;
      cx.beginPath(); cx.roundRect(-3, -2, 6, 9, 3); cx.fill();
      cx.translate(-armSwing * 0.14, 8);
      cx.beginPath(); cx.roundRect(-2.5, 0, 5, 7, 3); cx.fill();
      cx.fillStyle = colSkin;
      cx.beginPath(); cx.arc(0, 8, 3.5, 0, Math.PI * 2); cx.fill();
      cx.restore();

      // ── FRONT ARM ──
      cx.save(); cx.translate(13, -1);
      cx.fillStyle = colBody;
      cx.beginPath(); cx.roundRect(-3, -2, 6, 9, 3); cx.fill();
      cx.translate(armSwing * 0.14, 8);
      cx.beginPath(); cx.roundRect(-2.5, 0, 5, 7, 3); cx.fill();
      cx.fillStyle = colSkin;
      cx.beginPath(); cx.arc(0, 8, 3.5, 0, Math.PI * 2); cx.fill();
      cx.restore();

      // ── HEAD (bigger chibi head) ──
      // ── HEAD (proportional, not too big) ──
      cx.fillStyle = colSkin;
      // Neck
      cx.beginPath(); cx.roundRect(-3, -7, 6, 4, 2); cx.fill();
      // Head circle - r=10, center y=-16
      cx.beginPath(); cx.arc(0, -16, 10, 0, Math.PI * 2); cx.fill();

      // ── HAT ──
      if (isPlayer) {
        // Hard hat brim
        cx.fillStyle = '#bf360c';
        cx.beginPath(); cx.roundRect(-13, -22, 26, 4, 2); cx.fill();
        // Hard hat dome
        cx.fillStyle = '#e64a19';
        cx.beginPath(); cx.arc(0, -22, 10, Math.PI, 0); cx.fill();
        // Stripe
        cx.fillStyle = '#ff6d00';
        cx.beginPath(); cx.roundRect(-10, -23, 20, 3, 1); cx.fill();
        // Shine
        cx.fillStyle = 'rgba(255,255,255,0.35)';
        cx.beginPath(); cx.arc(-3, -26, 3.5, Math.PI, 0); cx.fill();
      } else {
        // NPC - flat cap, warna tetap (ditentukan saat spawn)
        const npcCapCol = capCol || '#e57373';
        cx.fillStyle = npcCapCol;
        // Brim tipis
        cx.beginPath(); cx.roundRect(-12, -24, 24, 4, 2); cx.fill();
        // Dome kecil di atas brim
        cx.beginPath(); cx.arc(0, -24, 9, Math.PI, 0); cx.fill();
        // Stripe
        cx.fillStyle = 'rgba(255,255,255,0.3)';
        cx.beginPath(); cx.roundRect(-9, -25, 18, 2.5, 1); cx.fill();
      }

      // ── FACE (disesuaikan head r=10, center y=-16) ──
      if (scared) {
        // Mata lebar panik
        cx.fillStyle = '#fff';
        cx.beginPath(); cx.ellipse(-4, -17, 3, 4, 0, 0, Math.PI * 2); cx.fill();
        cx.beginPath(); cx.ellipse(4, -17, 3, 4, 0, 0, Math.PI * 2); cx.fill();
        // Pupil kecil lihat ke atas
        cx.fillStyle = '#111';
        cx.beginPath(); cx.arc(-4, -20, 1.4, 0, Math.PI * 2); cx.fill();
        cx.beginPath(); cx.arc(4, -20, 1.4, 0, Math.PI * 2); cx.fill();
        cx.fillStyle = '#fff';
        cx.beginPath(); cx.arc(-3.3, -21, 0.6, 0, Math.PI * 2); cx.fill();
        cx.beginPath(); cx.arc(4.7, -21, 0.6, 0, Math.PI * 2); cx.fill();
        // Worried V-brows
        cx.strokeStyle = '#4e342e'; cx.lineWidth = 2; cx.lineCap = 'round';
        cx.beginPath(); cx.moveTo(-7, -22); cx.lineTo(-2.5, -20.5); cx.stroke();
        cx.beginPath(); cx.moveTo(7, -22); cx.lineTo(2.5, -20.5); cx.stroke();
        // O mouth
        cx.fillStyle = '#333';
        cx.beginPath(); cx.ellipse(0, -12, 2.8, 3.2, 0, 0, Math.PI * 2); cx.fill();
        cx.fillStyle = '#e91e63';
        cx.beginPath(); cx.ellipse(0, -12, 1.8, 2.2, 0, 0, Math.PI * 2); cx.fill();
        // Sweat + !!
        cx.scale(1 / dir, 1);
        cx.fillStyle = 'rgba(100,180,255,0.9)';
        cx.beginPath(); cx.arc(14, -18, 2, 0, Math.PI * 2); cx.fill();
        cx.beginPath(); cx.moveTo(13, -18); cx.lineTo(14, -21); cx.lineTo(15, -18); cx.fill();
        cx.fillStyle = '#ff6f00';
        cx.font = 'bold 12px Segoe UI'; cx.textAlign = 'center';
        cx.fillText('!!', 0, -30);
      } else {
        // ── CUTE NORMAL FACE (mata r=2.5, disesuaikan) ──
        // Left eye
        cx.fillStyle = '#fff';
        cx.beginPath(); cx.arc(-4, -17, 2.6, 0, Math.PI * 2); cx.fill();
        cx.fillStyle = '#1a237e';
        cx.beginPath(); cx.arc(-4, -17, 1.6, 0, Math.PI * 2); cx.fill();
        cx.fillStyle = '#fff';
        cx.beginPath(); cx.arc(-3.3, -17.8, 0.7, 0, Math.PI * 2); cx.fill();
        // Right eye
        cx.fillStyle = '#fff';
        cx.beginPath(); cx.arc(4, -17, 2.6, 0, Math.PI * 2); cx.fill();
        cx.fillStyle = '#1a237e';
        cx.beginPath(); cx.arc(4, -17, 1.6, 0, Math.PI * 2); cx.fill();
        cx.fillStyle = '#fff';
        cx.beginPath(); cx.arc(4.7, -17.8, 0.7, 0, Math.PI * 2); cx.fill();
        // Brows
        cx.strokeStyle = '#5d4037'; cx.lineWidth = 1.4; cx.lineCap = 'round';
        cx.beginPath(); cx.moveTo(-6.5, -20.5); cx.quadraticCurveTo(-4, -22.5, -1.5, -20.5); cx.stroke();
        cx.beginPath(); cx.moveTo(1.5, -20.5); cx.quadraticCurveTo(4, -22.5, 6.5, -20.5); cx.stroke();
        // Smile
        cx.strokeStyle = '#5d4037'; cx.lineWidth = 1.4;
        cx.beginPath(); cx.arc(0, -13, 2.8, 0.2, Math.PI - 0.2); cx.stroke();
        // Blush
        cx.fillStyle = 'rgba(255,120,100,0.25)';
        cx.beginPath(); cx.ellipse(-6.5, -13, 2.8, 1.6, 0, 0, Math.PI * 2); cx.fill();
        cx.beginPath(); cx.ellipse(6.5, -13, 2.8, 1.6, 0, 0, Math.PI * 2); cx.fill();
      }

      // Super mode ring
      if (superMode) {
        cx.shadowBlur = 0;
        cx.strokeStyle = 'rgba(0,255,200,0.7)'; cx.lineWidth = 2.5;
        cx.beginPath(); cx.arc(0, -8, 18, 0, Math.PI * 2); cx.stroke();
      }

      cx.restore();
    }

    function drawHeartups() {
      heartups.forEach(hu => {
        const bob = Math.sin(Date.now() * .003 + hu.bob) * 5;
        cx.save(); cx.translate(hu.x, hu.y + bob);
        cx.shadowBlur = 18; cx.shadowColor = '#ff4081';
        cx.fillStyle = '#ff4081';
        drawHeart(cx, 0, 0, 13);
        cx.shadowBlur = 0;
        cx.fillStyle = 'rgba(255,255,255,0.5)';
        cx.beginPath(); cx.ellipse(-3, -6, 3, 2, -0.5, 0, Math.PI * 2); cx.fill();
        cx.restore();
      });
    }

    function drawHeart(ctx, x, y, s) {
      ctx.save(); ctx.translate(x, y);
      ctx.beginPath();
      ctx.moveTo(0, s * 0.3);
      ctx.bezierCurveTo(s * 0.9, -s * 0.3, s * 1.1, -s * 0.9, 0, -s * 0.5);
      ctx.bezierCurveTo(-s * 1.1, -s * 0.9, -s * 0.9, -s * 0.3, 0, s * 0.3);
      ctx.fill();
      ctx.restore();
    }

    function drawGunups() {
      const now = Date.now() / 1000;
      gunups.forEach(gu => {
        const bob = Math.sin(now * 2 + gu.bob) * 5;
        const scl = 1 + Math.sin(now * 3 + gu.bob) * 0.08;
        cx.save(); cx.translate(gu.x, gu.y + bob);
        // Glow cyan
        cx.shadowBlur = 22; cx.shadowColor = '#00e5ff';
        cx.scale(scl, scl);
        // Spray can body
        cx.fillStyle = '#00bcd4';
        cx.beginPath(); cx.roundRect(-8, -14, 16, 22, 4); cx.fill();
        // Cap
        cx.fillStyle = '#e0f7fa';
        cx.beginPath(); cx.roundRect(-5, -18, 10, 6, 3); cx.fill();
        // Nozzle
        cx.fillStyle = '#fff';
        cx.beginPath(); cx.roundRect(4, -16, 7, 3, 1); cx.fill();
        // Label
        cx.fillStyle = '#fff';
        cx.beginPath(); cx.roundRect(-5, -8, 10, 8, 2); cx.fill();
        cx.fillStyle = '#006064';
        cx.font = 'bold 6px Segoe UI'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillText('💨', 0, -4);
        cx.shadowBlur = 0;
        cx.restore();

        // Label teks
        cx.fillStyle = '#00e5ff';
        cx.font = 'bold 10px Segoe UI'; cx.textAlign = 'center'; cx.textBaseline = 'top';
        cx.fillText('SEMPROTAN', gu.x, gu.y + bob + 14);
      });
    }

    function drawBullets() {
      const now = Date.now() / 1000;
      bullets.forEach(b => {
        cx.save(); cx.translate(b.x, b.y);
        const ang = Math.atan2(b.vy, b.vx);
        cx.rotate(ang);
        // Trail
        cx.shadowBlur = 16; cx.shadowColor = '#00e5ff';
        const trail = cx.createLinearGradient(-18, 0, 0, 0);
        trail.addColorStop(0, 'rgba(0,229,255,0)');
        trail.addColorStop(1, 'rgba(0,229,255,0.7)');
        cx.fillStyle = trail;
        cx.beginPath(); cx.ellipse(-9, 0, 9, 3, 0, 0, Math.PI * 2); cx.fill();
        // Bullet body
        cx.fillStyle = '#e0f7fa';
        cx.beginPath(); cx.ellipse(0, 0, 5, 3.5, 0, 0, Math.PI * 2); cx.fill();
        cx.fillStyle = '#00e5ff';
        cx.beginPath(); cx.ellipse(2, 0, 3, 2.5, 0, 0, Math.PI * 2); cx.fill();
        cx.shadowBlur = 0;
        cx.restore();
      });

      // Crosshair cursor saat punya senjata
      if (P && P.hasGun && st === S.PLAY) {
        const mx = mousePos.x, my = mousePos.y;
        cx.save();
        cx.strokeStyle = 'rgba(0,229,255,0.85)'; cx.lineWidth = 1.5;
        const cs = 10;
        cx.beginPath();
        cx.moveTo(mx - cs, my); cx.lineTo(mx + cs, my);
        cx.moveTo(mx, my - cs); cx.lineTo(mx, my + cs);
        cx.stroke();
        cx.beginPath(); cx.arc(mx, my, 5, 0, Math.PI * 2);
        cx.stroke();
        cx.restore();
      }
    }

    function drawNPCs() {
      npcs.forEach(n => {
        const nMoving = Math.abs(n.vx) > 5 || Math.abs(n.vy) > 5;
        n.bobT = (n.bobT || rand(0, 10)) + (nMoving ? 0.16 : 0.04);
        drawCharacter(n.x, n.y, n.vx, n.vy, n.bobT, n.col, '#ffccaa', false, n.scared, n.facingDir || 1, P.superT > 0, n.capCol);
      });
    }

    function drawPollClouds() {
      pollClouds.forEach(pc => {
        const t = Date.now() / 1000;
        // Animasi: float naik-turun, scale pulse, goyang kiri-kanan
        const floatY = Math.sin(t * 1.8 + pc.pulse) * 5;       // naik turun
        const scl    = 1 + Math.sin(t * 2.5 + pc.pulse) * 0.08; // scale pulse
        const wobble = Math.sin(t * 3.0 + pc.pulse) * 0.12;     // goyang
        const flipX  = pc.vx > 0 ? -1 : 1;                       // flip saat jalan kanan (gambar default hadap kiri)

        cx.save();
        cx.translate(pc.x, pc.y + floatY);
        cx.rotate(wobble);
        cx.scale(flipX * scl, scl);

        // Shadow di bawah monster
        cx.shadowBlur = 20 + Math.sin(t * 2 + pc.pulse) * 8;
        cx.shadowColor = pc.hitT > 0 ? 'rgba(255,50,50,0.9)' : 'rgba(160,0,255,0.7)';

        // Gambar aset monster jika sudah load
        const sz = pc.r * 3.8; // ukuran sprite
        if (monsterImg.complete && monsterImg.naturalWidth > 0) {
          cx.drawImage(monsterImg, -sz / 2, -sz / 2, sz, sz);
        } else {
          // Fallback canvas shape jika gambar belum load
          const cg = cx.createRadialGradient(0, 0, 1, 0, 0, pc.r);
          cg.addColorStop(0, 'rgba(190,80,255,0.95)');
          cg.addColorStop(1, 'rgba(80,0,160,0.8)');
          cx.fillStyle = cg;
          cx.beginPath(); cx.arc(0, 0, pc.r, 0, 6.28); cx.fill();
        }

        // Flash merah saat kena hit
        if (pc.hitT > 0) {
          cx.globalAlpha = pc.hitT * 0.5;
          cx.fillStyle = '#ff3333';
          cx.beginPath(); cx.arc(0, 0, pc.r * 1.8, 0, 6.28); cx.fill();
          cx.globalAlpha = 1;
        }

        cx.shadowBlur = 0;
        cx.restore();
      });
    }

    function drawBg() {
      cx.fillStyle = levelData.skyColor; cx.fillRect(0, 0, W, H);
      [130, 260, 390, 520].forEach(y => {
        cx.fillStyle = 'rgba(0,0,0,0.3)'; cx.fillRect(0, y - 22, W, 44);
        cx.strokeStyle = 'rgba(255,255,255,0.06)'; cx.lineWidth = 1;
        cx.setLineDash([28, 18]);
        cx.beginPath(); cx.moveTo(0, y); cx.lineTo(W, y); cx.stroke();
        cx.setLineDash([]);
      });

      bldg.forEach((b, i) => {
        const [x, y, w, h] = b;
        const leanX = 0;
        const leanY = -25;
        const bR = levelData.buildingBase[0] + i % 3 * 10, bG = levelData.buildingBase[1] + i % 4 * 10, bB = levelData.buildingBase[2] + i % 2 * 10;

        cx.fillStyle = `rgb(${bR + 8},${bG + 8},${bB + 8})`;
        cx.beginPath(); cx.moveTo(x + w, y); cx.lineTo(x + w + leanX, y + leanY); cx.lineTo(x + w + leanX, y + h + leanY); cx.lineTo(x + w, y + h); cx.fill();
        cx.beginPath(); cx.moveTo(x, y); cx.lineTo(x + leanX, y + leanY); cx.lineTo(x + leanX, y + h + leanY); cx.lineTo(x, y + h); cx.fill();
        cx.fillStyle = `rgb(${bR + 4},${bG + 4},${bB + 4})`;
        cx.beginPath(); cx.moveTo(x, y + h); cx.lineTo(x + leanX, y + h + leanY); cx.lineTo(x + w + leanX, y + h + leanY); cx.lineTo(x + w, y + h); cx.fill();
        cx.beginPath(); cx.moveTo(x, y); cx.lineTo(x + leanX, y + leanY); cx.lineTo(x + w + leanX, y + leanY); cx.lineTo(x + w, y); cx.fill();

        cx.fillStyle = `rgb(${bR + 16},${bG + 16},${bB + 16})`;
        cx.fillRect(x + leanX, y + leanY, w, h);
        cx.strokeStyle = `rgba(255,255,255,0.05)`; cx.lineWidth = 1;
        cx.strokeRect(x + leanX, y + leanY, w, h);

        cx.fillStyle = `rgb(${bR},${bG},${bB})`;
        cx.fillRect(x + leanX + 15, y + leanY + 15, 12, 12);

        if (levelData.overlay.indexOf('0.6') !== -1 || levelData.overlay.indexOf('0.7') !== -1 || levelData.overlay.indexOf('0.65') !== -1) {
          if (i % 2 === 0) {
            cx.fillStyle = 'rgba(255, 230, 90, 0.4)';
            cx.beginPath();
            for (let wy = 5; wy < h - 20; wy += 18) {
              for (let wx = 5; wx < w - 20; wx += 20) {
                if (Math.sin(i * 7.3 + wx * .07 + wy * .05) > 0.4) {
                  cx.fillRect(x + w / 2 + wx - w / 2 + leanX * 0.5, y + h + wy - h / 2 + leanY * 0.5, 6, 8);
                }
              }
            }
          }
        }
      });
    }

    function drawLamps() {
      const now = Date.now() / 1000;
      lamps.forEach(l => {
        const flicker = l.fixed ? (0.85 + Math.sin(now * 8.3 + l.flickerT) * 0.15) : 0;

        // Cone cahaya sederhana (tanpa gradient per frame = lebih cepat)
        if (l.fixed) {
          const coneAlpha = 0.10 * flicker;
          cx.fillStyle = `rgba(255,220,80,${coneAlpha})`;
          cx.beginPath();
          cx.moveTo(l.x + 10, l.y);
          cx.lineTo(l.x + 10 - 55, l.y + 80);
          cx.lineTo(l.x + 10 + 55, l.y + 80);
          cx.closePath(); cx.fill();
        }

        // Tiang (pole)
        cx.strokeStyle = l.fixed ? '#78909c' : '#546e7a';
        cx.lineWidth = 4; cx.lineCap = 'round';
        cx.beginPath(); cx.moveTo(l.x, l.y + 38); cx.lineTo(l.x, l.y + 6); cx.stroke();
        // Lengan
        cx.lineWidth = 3;
        cx.beginPath(); cx.moveTo(l.x, l.y + 6); cx.lineTo(l.x + 10, l.y + 6); cx.stroke();
        // Housing
        cx.fillStyle = l.fixed ? '#455a64' : '#37474f';
        cx.beginPath(); cx.roundRect(l.x + 2, l.y - 4, 16, 10, 3); cx.fill();
        // Bola lampu (tanpa shadowBlur)
        cx.fillStyle = l.fixed ? `rgba(255,${200 + flicker * 55 | 0},40,${flicker})` : '#263238';
        cx.beginPath(); cx.arc(l.x + 10, l.y + 1, 5, 0, 6.28); cx.fill();
        // Inner white dot
        if (l.fixed && flicker > 0.88) {
          cx.fillStyle = 'rgba(255,255,220,0.85)';
          cx.beginPath(); cx.arc(l.x + 10, l.y + 1, 2, 0, 6.28); cx.fill();
        }

        // Durability bar
        if (l.fixed) {
          const pct = Math.max(0, Math.min(1, l.life / 100));
          const bx = l.x + 2, by = l.y - 12, bw = 22, bh = 4;
          cx.fillStyle = 'rgba(0,0,0,0.55)';
          cx.beginPath(); cx.roundRect(bx, by, bw, bh, 2); cx.fill();
          const barCol = pct > 0.5 ? '#69f0ae' : pct > 0.25 ? '#ffd740' : '#ff5252';
          cx.fillStyle = barCol;
          if (pct > 0) { cx.beginPath(); cx.roundRect(bx, by, bw * pct, bh, 2); cx.fill(); }
        }
      });
    }

    function drawBins() {
      if (!bins) return;
      const now = Date.now() / 1000;
      bins.forEach(b => {
        if (b.pulse > 0) b.pulse -= 0.03;
        const scl   = 1 + b.pulse * 0.2;
        const col   = BIN_COLOR[b.type];
        const dark  = BIN_DARK[b.type];
        const label = BIN_LABEL[b.type];
        const nearPlayer = P && dist(P.x, P.y, b.x, b.y) < 70;

        cx.save(); cx.translate(b.x, b.y); cx.scale(scl, scl);
        // Bayangan bawah
        cx.fillStyle = 'rgba(0,0,0,0.2)';
        cx.beginPath(); cx.ellipse(0, 22, 16, 4, 0, 0, Math.PI * 2); cx.fill();
        // Badan
        cx.fillStyle = dark;
        cx.beginPath(); cx.roundRect(-16, -18, 32, 38, [4,4,6,6]); cx.fill();
        cx.fillStyle = col;
        cx.beginPath(); cx.roundRect(-14, -16, 28, 32, [3,3,5,5]); cx.fill();
        // Highlight
        cx.fillStyle = 'rgba(255,255,255,0.18)';
        cx.beginPath(); cx.roundRect(-14, -16, 28, 8, [3,3,0,0]); cx.fill();
        // Tutup
        cx.fillStyle = dark;
        cx.beginPath(); cx.roundRect(-18, -22, 36, 8, [5,5,2,2]); cx.fill();
        // Lubang
        cx.fillStyle = 'rgba(0,0,0,0.28)';
        cx.beginPath(); cx.roundRect(-8, -8, 16, 8, 3); cx.fill();
        // Simbol
        const icons = { organik: '🌿', plastik: '♻️', logam: '⚙️' };
        cx.font = '14px Segoe UI'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillText(icons[b.type], 0, 6);
        // Ring indikator proximity (tanpa shadow)
        if (nearPlayer) {
          cx.strokeStyle = col; cx.lineWidth = 2;
          cx.beginPath(); cx.roundRect(-18, -24, 36, 48, 6); cx.stroke();
        }
        cx.restore();

        // Label
        cx.fillStyle = nearPlayer ? col : 'rgba(255,255,255,0.65)';
        cx.font = nearPlayer ? 'bold 11px Segoe UI' : '10px Segoe UI';
        cx.textAlign = 'center'; cx.textBaseline = 'top';
        cx.fillText(label, b.x, b.y + 25);

        // [F] prompt berkedip saat dekat & ada sampah
        if (nearPlayer && P.bag.length > 0) {
          const a = 0.6 + Math.sin(now * 5) * 0.4;
          cx.globalAlpha = a;
          cx.fillStyle = col; cx.font = 'bold 12px Segoe UI';
          cx.textAlign = 'center'; cx.textBaseline = 'bottom';
          cx.fillText('[F] Buang', b.x, b.y - 25);
          cx.globalAlpha = 1;
        }
      });
    }

    function drawPowerups() {
      powerups.forEach(pu => {
        const bob = Math.sin(Date.now() * .003 + pu.bob) * 5;
        cx.save(); cx.translate(pu.x, pu.y + bob);
        cx.fillStyle = '#00ffcc';
        cx.beginPath(); cx.arc(0, 0, pu.r, 0, Math.PI * 2); cx.fill();
        cx.fillStyle = '#fff';
        cx.font = '16px Segoe UI'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillText('T', 0, 0);
        cx.restore();
      });
    }

    function drawTrash() {
      const now = Date.now() / 1000;
      trash.forEach(t => {
        const bob = Math.sin(now * 1.8 + t.bob) * 4;  // float naik-turun
        const scl = 1 + Math.sin(now * 2.2 + t.bob) * 0.05; // scale pulse

        const img = trashImgs[t.type % 3];
        const imgOk = img.complete && img.naturalWidth > 0;

        cx.save();
        cx.translate(t.x, t.y + bob);
        cx.scale(scl, scl);

        if (imgOk) {
          const sz = t.r * 2.4;
          cx.drawImage(img, -sz / 2, -sz / 2, sz, sz);
        } else {
          if (t.type === 0) {
            cx.fillStyle = '#e0e0e0';
            cx.beginPath(); cx.moveTo(-5,-5); cx.lineTo(3,-7); cx.lineTo(6,2); cx.lineTo(0,6); cx.lineTo(-6,3); cx.fill();
          } else if (t.type === 1) {
            cx.fillStyle = '#4caf50'; rrect(-3,-6,6,12,2);
          } else {
            cx.fillStyle = '#f44336'; rrect(-4,-5,8,10,1);
          }
        }

        cx.restore();
      });
    }

    function drawCars() {
      cars.forEach(c => {
        cx.save(); cx.translate(c.x, c.y);
        const col = c.col || '#e53935';
        cx.shadowBlur = 14; cx.shadowColor = col;
        if (c.h) {
          if (c.spd < 0) cx.scale(-1, 1);
          const w = c.w, h = c.ht;
          cx.fillStyle = col; rrect(-w / 2, -h / 2, w, h, 5);
          cx.fillStyle = 'rgba(0,0,0,0.3)'; cx.fillRect(-w / 2 + 5, -h / 2 + 4, w - 10, h * .4);
          cx.shadowColor = '#fffde7'; cx.shadowBlur = 8; cx.fillStyle = '#fffde7';
          cx.fillRect(w / 2 - 7, -h / 2 + 3, 5, 5); cx.fillRect(w / 2 - 7, h / 2 - 8, 5, 5);
        } else {
          if (c.spd < 0) cx.scale(1, -1);
          const w = c.w, h = c.ht;
          cx.fillStyle = col; rrect(-w / 2, -h / 2, w, h, 5);
          cx.fillStyle = 'rgba(0,0,0,0.3)'; cx.fillRect(-w / 2 + 3, -h / 2 + 5, w - 6, h * .35);
          cx.shadowColor = '#fffde7'; cx.shadowBlur = 8; cx.fillStyle = '#fffde7';
          cx.fillRect(-w / 2 + 3, h / 2 - 7, 5, 5); cx.fillRect(w / 2 - 8, h / 2 - 7, 5, 5);
        }
        cx.shadowBlur = 0; cx.restore();
      });
    }

    function drawParts() {
      parts.forEach(p => {
        cx.globalAlpha = p.life; cx.fillStyle = p.col;
        cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, 6.28); cx.fill();
      });
      cx.globalAlpha = 1;
    }

    function drawPlayer() {
      if (!P.blink) return;
      const isMoving = Math.abs(P.vx) > 5 || Math.abs(P.vy) > 5;
      P.bobT = (P.bobT || 0) + (isMoving ? 0.17 : 0.04);
      drawCharacter(P.x, P.y, P.vx, P.vy, P.bobT, '#00838f', '#ffccaa', true, P.scared || false, P.facingDir || 1, P.superT > 0);
    }

    let lightCanvas, lcx;
    function drawLighting() {
      if (!lightCanvas) {
        lightCanvas = document.createElement('canvas');
        lightCanvas.width = W; lightCanvas.height = H;
        lcx = lightCanvas.getContext('2d');
      }
      lcx.globalCompositeOperation = 'source-over';
      lcx.clearRect(0, 0, W, H);
      lcx.fillStyle = levelData.overlay;
      lcx.fillRect(0, 0, W, H);
      lcx.globalCompositeOperation = 'destination-out';
      lamps.forEach(l => {
        if (l.fixed) {
          let radius = 170;
          const g = lcx.createRadialGradient(l.x, l.y, 0, l.x, l.y, radius);
          g.addColorStop(0, 'rgba(255,255,255,1)');
          g.addColorStop(1, 'rgba(255,255,255,0)');
          lcx.fillStyle = g;
          lcx.beginPath(); lcx.arc(l.x, l.y, radius, 0, Math.PI * 2); lcx.fill();
        }
      });
      cx.drawImage(lightCanvas, 0, 0);
    }

    function drawHUD() {
      cx.fillStyle = 'rgba(10,20,40,0.85)';
      rrect(10, 10, W - 20, 54, 10);
      cx.strokeStyle = 'rgba(64,200,240,0.3)'; cx.lineWidth = 1;
      rrect(10, 10, W - 20, 54, 10, null, null, true);
      cx.fillStyle = '#40c8f0'; cx.font = 'bold 20px Segoe UI'; cx.textAlign = 'left'; cx.textBaseline = 'middle';
      cx.fillText('SKOR', 30, 26);
      cx.fillStyle = '#fff'; cx.font = 'bold 28px Segoe UI';
      cx.fillText(score, 30, 48);
      cx.textAlign = 'center';
      cx.fillStyle = '#ffd740'; cx.font = 'bold 16px Segoe UI';
      cx.fillText(levelData.name, W / 2, 24);
      cx.fillStyle = '#fff'; cx.font = 'bold 26px Segoe UI';
      cx.fillText(Math.ceil(timer) + 's', W / 2, 48);
      // Hearts

      for (let i = 0; i < Math.max(lives, 3); i++) {

        cx.font = 'bold 13px Segoe UI'; cx.textAlign = 'right'; cx.textBaseline = 'middle';
        cx.shadowBlur = 8; cx.shadowColor = '#00e5ff';
        cx.fillText('💨 ' + P.ammo + 'x', ax, 37);
        cx.shadowBlur = 0;
      }

      // ── BAG / TAS SAMPAH ──

        cx.strokeStyle = 'rgba(255,255,255,0.15)'; cx.lineWidth = 1;

        // Label
        cx.fillStyle = 'rgba(255,255,255,0.6)'; cx.font = '11px Segoe UI';

            cx.beginPath(); cx.roundRect(sx - 9, sy - 9, 18, 18, 3); cx.fill();

            cx.textAlign = 'center'; cx.textBaseline = 'middle';
            cx.fillText(cat[0].toUpperCase(), sx, sy);

        cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '10px Segoe UI';
        cx.textAlign = 'left'; cx.textBaseline = 'middle';
        cx.fillText(P.bag.length + '/' + BAG_MAX, bagX + 168, bagY + 15);
      }
    }

    function drawFlash() {
      const a = Math.min(flashT, 1);

    function drawMenu() {
      cx.fillStyle = '#05081a'; cx.fillRect(0, 0, W, H);
      // Title
      cx.shadowBlur = 30; cx.shadowColor = 'rgba(64,200,240,0.6)';
      cx.fillStyle = '#40c8f0'; cx.font = 'bold 50px Segoe UI'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
      cx.fillText('City Fixer', W / 2, H / 2 - 80);
      cx.shadowBlur = 0;
      // Subtitle
      cx.fillStyle = '#fff'; cx.font = '18px Segoe UI';
      cx.fillText('Selesaikan 5 Level untuk membersihkan kota!', W / 2, H / 2 - 20);

      // Play Button
      window._menuBtn = { play: { x: W / 2 - 100, y: H / 2 + 40, w: 200, h: 50 } };
      cx.fillStyle = 'rgba(64,200,240,0.2)'; cx.strokeStyle = '#40c8f0'; cx.lineWidth = 2;
      rrect(window._menuBtn.play.x, window._menuBtn.play.y, window._menuBtn.play.w, window._menuBtn.play.h, 25, null, null, true);
      cx.fillStyle = '#40c8f0'; cx.font = 'bold 20px Segoe UI'; cx.textBaseline = 'middle';
      cx.fillText('MAIN SEKARANG', W / 2, H / 2 + 65);
    }

    function drawPanel(win) {
      cx.fillStyle = 'rgba(7,9,26,0.88)'; cx.fillRect(0, 0, W, H);
      const px = (W - 480) / 2, py = (H - 320) / 2;
      cx.fillStyle = win ? '#102810' : '#280a0a';
      rrect(px, py, 480, 320, 16, true);
      cx.textAlign = 'center'; cx.fillStyle = '#fff'; cx.font = 'bold 38px Segoe UI';
      cx.fillText(win ? 'LEVEL SELESAI!' : 'GAGAL', W / 2, py + 80);
      cx.font = '22px Segoe UI';
      cx.fillText('Skor: ' + score, W / 2, py + 130);
      window._panelRestartBtn = { x: px + 100, y: py + 200, w: 280, h: 50 };
      cx.fillStyle = '#40c8f0'; rrect(px + 100, py + 200, 280, 50, 25, true);
      cx.fillStyle = '#000'; cx.font = 'bold 20px Segoe UI'; cx.textBaseline = 'middle';
      const txt = win ? (currentLevelIdx < LEVELS.length - 1 ? 'LANJUT LEVEL ' + (currentLevelIdx + 2) : 'TAMAT - MAIN LAGI') : 'ULANGI LEVEL';
      cx.fillText(txt, W / 2, py + 225);
    }

    function drawFloats() {
      floats.forEach(f => {
        cx.save(); cx.globalAlpha = Math.min(f.life, 1);
        cx.fillStyle = f.col; cx.font = 'bold 20px Segoe UI';
        cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillText(f.txt, f.x, f.y);
        cx.restore();
      });
    }

    function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
    function rand(a, b) { return a + Math.random() * (b - a); }
    function rectCircle(rx, ry, rw, rh, cx2, cy2, cr) {
      const nx = clamp(cx2, rx, rx + rw), ny = clamp(cy2, ry, ry + rh);
      return dist(cx2, cy2, nx, ny) < cr;
    }
    function burst(x, y, col, n) {
      for (let i = 0; i < n; i++) {
        const a = Math.random() * 6.28, sp = rand(60, 180);
        parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: .8, r: 3 + rand(0, 3), col: col });
      }
    }
    function rrect(x, y, w, h, r, fill = true, stroke = false, doStroke = false) {
      cx.beginPath();
      cx.moveTo(x + r, y); cx.lineTo(x + w - r, y); cx.arcTo(x + w, y, x + w, y + r, r);
      cx.lineTo(x + w, y + h - r); cx.arcTo(x + w, y + h, x + w - r, y + h, r);
      cx.lineTo(x + r, y + h); cx.arcTo(x, y + h, x, y + h - r, r);
      cx.lineTo(x, y + r); cx.arcTo(x, y, x + r, y, r); cx.closePath();
      if (fill) cx.fill(); if (doStroke) cx.stroke();
    }

    cv.addEventListener('click', e => {
      const rect = cv.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (W / rect.width), my = (e.clientY - rect.top) * (H / rect.height);
      if (st === S.WIN || st === S.LOSE) {
        if (mx >= window._panelRestartBtn.x && mx <= window._panelRestartBtn.x + window._panelRestartBtn.w && my >= window._panelRestartBtn.y && my <= window._panelRestartBtn.y + window._panelRestartBtn.h) {
          if (panelWin) {
            if (currentLevelIdx < LEVELS.length - 1) { currentLevelIdx++; init(false); }
            else { init(true); }
          } else { init(true); }
        }
      } else if (st === S.MENU) {
        if (window._menuBtn && window._menuBtn.play) {
          if (mx >= window._menuBtn.play.x && mx <= window._menuBtn.play.x + window._menuBtn.play.w && my >= window._menuBtn.play.y && my <= window._menuBtn.play.y + window._menuBtn.play.h) {
            init(true);
          }
        } else {
          init(true); // Fallback
        }
      }
    });

    let touch = { active: false, sx: 0, sy: 0, dx: 0, dy: 0 };
    cv.addEventListener('touchstart', e => {
      e.preventDefault();
      const rect = cv.getBoundingClientRect();
      const scaleX = W / rect.width, scaleY = H / rect.height;
      const t = e.touches[0];
      touch.active = true;
      touch.sx = (t.clientX - rect.left) * scaleX;
      touch.sy = (t.clientY - rect.top) * scaleY;
      touch.dx = 0; touch.dy = 0;
      if (st === S.MENU || st === S.WIN || st === S.LOSE) { AC.resume(); init(); }
    }, { passive: false });
    cv.addEventListener('touchmove', e => {
      e.preventDefault();
      const rect = cv.getBoundingClientRect();
      const scaleX = W / rect.width, scaleY = H / rect.height;
      const t = e.touches[0];
      const cx2 = (t.clientX - rect.left) * scaleX, cy2 = (t.clientY - rect.top) * scaleY;
      touch.dx = clamp((cx2 - touch.sx) / 50, -1, 1);
      touch.dy = clamp((cy2 - touch.sy) / 50, -1, 1);
    }, { passive: false });
    cv.addEventListener('touchend', e => {
      e.preventDefault();
      touch.active = false; touch.dx = 0; touch.dy = 0;
      // tap E to fix lamp
      if (st === S.PLAY) fixLamp();
    }, { passive: false });

    // ── START ──────────────────────────────────────────────
    requestAnimationFrame(loop);
  </script>
</body>
